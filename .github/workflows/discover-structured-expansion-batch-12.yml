name: Discover Structured Expansion Batch 12

on:
  push:
    branches:
      - data/structured-expansion-batch-12
    paths:
      - '.github/workflows/discover-structured-expansion-batch-12.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/discover-structured-expansion-batch-12.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-12
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests beautifulsoup4 pypdf cryptography
      - name: Crawl official IR and score PDFs
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          mkdir -p "artifacts/batch-12-discovery/shard-${SHARD}"
          python - <<'PY'
          import hashlib, html, json, os, re, time, urllib.parse
          from pathlib import Path
          import requests
          from bs4 import BeautifulSoup
          from pypdf import PdfReader

          shard = int(os.environ['SHARD'])
          all_targets = [
            ('147A','ソラコム','情報・通信業','https://soracom.com/ja-jp/company/ir/'),
            ('2160','ジーエヌアイグループ','医薬品','https://www.gnipharma.com/ir/'),
            ('2702','日本マクドナルドホールディングス','小売業','https://www.mcd-holdings.co.jp/ir/'),
            ('290A','Synspective','情報・通信業','https://synspective.com/jp/ir/'),
            ('2998','クリアル','不動産業','https://corp.creal.jp/ir/'),
            ('3491','GA technologies','不動産業','https://www.ga-tech.co.jp/ir/'),
            ('3994','マネーフォワード','情報・通信業','https://corp.moneyforward.com/ir/'),
            ('4165','プレイド','情報・通信業','https://plaid.co.jp/ir/'),
            ('4324','電通グループ','サービス業','https://www.group.dentsu.com/jp/ir/'),
            ('4369','トリケミカル研究所','化学','https://www.trichemical.com/ir/'),
            ('4375','セーフィー','情報・通信業','https://safie.co.jp/ir/'),
            ('4593','ヘリオス','医薬品','https://www.healios.co.jp/ir/'),
            ('4894','クオリプス','医薬品','https://cuorips.co.jp/ir/'),
            ('5038','eWeLL','情報・通信業','https://ewell.co.jp/ir/'),
            ('5574','ABEJA','情報・通信業','https://www.abejainc.com/ir/'),
            ('6146','ディスコ','機械','https://www.disco.co.jp/jp/ir/'),
            ('6227','AIメカテック','機械','https://www.ai-mech.com/ir/'),
            ('6239','ナガオカ','機械','https://www.nagaokajapan.co.jp/ir/'),
            ('6264','マルマエ','機械','https://www.marumae.com/ir/'),
            ('6273','SMC','機械','https://www.smcworld.com/ir/'),
            ('6291','日本エアーテック','機械','https://www.airtech.co.jp/ir/'),
            ('6338','タカトリ','機械','https://www.takatori-g.co.jp/ir/'),
            ('6521','オキサイド','電気機器','https://www.opt-oxide.com/ir/'),
            ('6613','QDレーザ','電気機器','https://www.qdlaser.com/ja/ir/'),
            ('6626','SEMITEC','電気機器','https://www.semitec.co.jp/ir/'),
            ('6627','テラプローブ','電気機器','https://www.teraprobe.com/ir/'),
            ('6637','寺崎電気産業','電気機器','https://www.terasaki.co.jp/investor/'),
            ('6677','エスケーエレクトロニクス','電気機器','https://www.sk-el.co.jp/ir/'),
            ('6723','ルネサスエレクトロニクス','電気機器','https://www.renesas.com/jp/ja/about/investor-relations'),
            ('6777','santec Holdings','電気機器','https://www.santec.com/jp/ir/index.html'),
            ('6855','日本電子材料','電気機器','https://www.jem-net.co.jp/ir/ir-msg'),
            ('7214','GMB','輸送用機器','https://www.gmb.jp/ir-info/'),
            ('7373','アイドマ・ホールディングス','サービス業','https://www.aidma-hd.jp/ir/'),
            ('7741','HOYA','精密機器','https://www.hoya.com/ir/'),
            ('7746','岡本硝子','精密機器','https://ogc-jp.com/irinfo/'),
            ('8029','ルックホールディングス','繊維製品','https://www.look-holdings.jp/irinfo/'),
            ('8198','マックスバリュ東海','小売業','https://www.mv-tokai.co.jp/company/profile/ir/'),
            ('8473','SBIホールディングス','証券、商品先物取引業','https://www.sbigroup.co.jp/investors/'),
            ('8704','トレイダーズホールディングス','証券、商品先物取引業','https://www.tradershd.com/ir/'),
            ('8772','アサックス','その他金融業','https://www.asax.co.jp/ir/'),
            ('8871','ゴールドクレスト','不動産業','https://www.goldcrest.co.jp/ir/'),
            ('9022','東海旅客鉄道','陸運業','https://company.jr-central.co.jp/ir/'),
            ('9033','広島電鉄','陸運業','https://www.hiroden.co.jp/company/'),
            ('9051','センコン物流','陸運業','https://www.senkon.co.jp/ir/'),
            ('9380','東海運','倉庫・運輸関連業','https://www.azumaship.co.jp/ir/'),
            ('9414','日本BS放送','情報・通信業','https://corp.bs11.jp/ja/ir.html'),
            ('9475','昭文社ホールディングス','情報・通信業','https://www.mapple.co.jp/ir/'),
            ('9708','帝国ホテル','サービス業','https://www.imperialhotel.co.jp/financial'),
            ('9761','東海リース','サービス業','https://www.tokai-lease.co.jp/ir/'),
            ('9972','アルテック','卸売業','https://www.altech.co.jp/ir/'),
          ]
          targets = [row for index, row in enumerate(all_targets) if index % 5 == shard]
          out = Path(f'artifacts/batch-12-discovery/shard-{shard}')
          session = requests.Session()
          session.headers.update({
            'User-Agent':'Mozilla/5.0 (compatible; Chu-kei official evidence audit/2.0)',
            'Accept-Language':'ja,en-US;q=0.8,en;q=0.6',
          })

          link_terms = ['中期','長期','経営計画','経営戦略','成長戦略','事業計画','財務方針','統合報告','決算説明','説明資料','management','strategy','plan','vision','presentation','financial','2030','2029','2028','2027','2026','library','ir']
          negative_terms = ['招集通知','有価証券報告書','コーポレートガバナンス','株主総会','定款','大量保有']
          patterns = {
            'plan': r'(中期経営計画|中長期経営計画|長期経営計画|経営戦略|成長戦略|事業計画|中期財務方針|medium.?term|mid.?term|long.?term|vision)',
            'revenue': r'(売上高|売上収益|営業収益|ARR|revenue)',
            'profit': r'(営業利益|事業利益|経常利益|EBITDA|EBITA|調整後営業利益|operating profit)',
            'capital': r'(ROE|ROIC|ROCE|PBR|資本効率|資本コスト)',
            'investment': r'(設備投資|成長投資|戦略投資|研究開発|M&A|投資総額|キャピタルアロケーション)',
            'return': r'(配当性向|DOE|総還元性向|株主還元|自己株式取得|累進配当|配当方針)',
            'progress': r'(進捗|達成率|見通し|上方修正|下方修正|最新予想|業績予想)',
            'future': r'(202[6-9]|203[0-5])年?度?',
          }
          weights = {'plan':25,'revenue':12,'profit':12,'capital':12,'investment':12,'return':12,'progress':8,'future':7}

          def allowed(url, host):
            current = (urllib.parse.urlparse(url).hostname or '').lower()
            host = host.lower()
            return current == host or current.endswith('.' + host)

          def request(url, binary=False):
            response = session.get(url, timeout=35, allow_redirects=True)
            response.raise_for_status()
            return response.content if binary else (response.text, response.url, response.headers.get('content-type',''))

          def link_score(label, url):
            text = html.unescape(f'{label} {url}').lower().replace(' ','')
            score = sum(4 for term in link_terms if term.lower().replace(' ','') in text)
            score -= sum(8 for term in negative_terms if term.lower().replace(' ','') in text)
            if '.pdf' in text: score += 3
            return score

          report = {}
          for code, name, category, start_url in targets:
            company_dir = out / code
            company_dir.mkdir(parents=True, exist_ok=True)
            host = urllib.parse.urlparse(start_url).hostname or ''
            queue = [(start_url, 0)]
            seen = set()
            pages = []
            pdfs = {}
            while queue and len(seen) < 45:
              url, depth = queue.pop(0)
              if url in seen or not allowed(url, host):
                continue
              seen.add(url)
              try:
                text, final_url, content_type = request(url)
              except Exception as error:
                pages.append({'url':url,'error':str(error)})
                continue
              if 'pdf' in content_type.lower() or final_url.lower().split('?')[0].endswith('.pdf'):
                pdfs.setdefault(final_url, {'label':'','from':url,'linkScore':link_score('',final_url)})
                continue
              pages.append({'url':final_url,'contentType':content_type})
              soup = BeautifulSoup(text, 'html.parser')
              for node in soup.find_all(['a','iframe','embed','object']):
                raw = node.get('href') or node.get('src') or node.get('data')
                if not raw:
                  continue
                absolute = urllib.parse.urljoin(final_url, html.unescape(raw))
                label = ' '.join(node.get_text(' ', strip=True).split())
                combined = f'{label} {absolute}'.lower()
                score = link_score(label, absolute)
                if '.pdf' in absolute.lower() or 'pdf' in (node.get('type') or '').lower():
                  candidate = {'label':label,'from':final_url,'linkScore':score}
                  previous = pdfs.get(absolute)
                  if previous is None or candidate['linkScore'] > previous['linkScore']:
                    pdfs[absolute] = candidate
                elif depth < 3 and allowed(absolute, host) and any(term.lower() in combined for term in link_terms):
                  queue.append((absolute, depth + 1))
              for match in re.findall(r'(?:https?:)?//[^\s"\'<>]+\.pdf(?:\?[^\s"\'<>]*)?|[/A-Za-z0-9_.~%-]+\.pdf(?:\?[^\s"\'<>]*)?', text, re.I):
                absolute = urllib.parse.urljoin(final_url, html.unescape(match))
                pdfs.setdefault(absolute, {'label':'','from':final_url,'linkScore':link_score('',absolute)})

            candidates = sorted(({'url':url, **meta} for url, meta in pdfs.items()), key=lambda row:(-row['linkScore'], row['url']))[:24]
            extracted = []
            for index, item in enumerate(candidates):
              try:
                data = request(item['url'], binary=True)
                if not data.startswith(b'%PDF') or len(data) > 45_000_000:
                  continue
                pdf_path = company_dir / f'{index:02d}.pdf'
                pdf_path.write_bytes(data)
                reader = PdfReader(pdf_path)
                rows = []
                evidence_pages = []
                joined_parts = []
                for page_no, page in enumerate(reader.pages, 1):
                  text = re.sub(r'\s+', ' ', (page.extract_text() or '').strip())
                  if text:
                    rows.append({'page':page_no,'text':text[:22000]})
                    joined_parts.append(text[:22000])
                    if re.search(r'(中期経営計画|長期経営計画|財務方針|売上高|売上収益|ARR|営業利益|EBITDA|ROE|ROIC|設備投資|成長投資|M&A|配当性向|株主還元|自己株式取得|202[6-9]|2030)', text, re.I):
                      evidence_pages.append(page_no)
                joined = '\n'.join(joined_parts[:140])
                hits = {key: bool(re.search(pattern, joined, re.I)) for key, pattern in patterns.items()}
                content_score = sum(weights[key] for key, value in hits.items() if value)
                pages_file = company_dir / f'{index:02d}.pages.json'
                pages_file.write_text(json.dumps(rows, ensure_ascii=False, indent=2), encoding='utf-8')
                extracted.append({
                  **item,
                  'file':pdf_path.name,
                  'pagesFile':pages_file.name,
                  'pageCount':len(reader.pages),
                  'textPages':len(rows),
                  'contentScore':content_score,
                  'contentHits':hits,
                  'evidencePages':evidence_pages[:160],
                  'metadata':{str(key):str(value) for key, value in (reader.metadata or {}).items()},
                  'bytes':len(data),
                  'sha256':hashlib.sha256(data).hexdigest(),
                })
              except Exception as error:
                item['error'] = str(error)
            extracted.sort(key=lambda row:(-row['contentScore'], -row['linkScore'], row['url']))
            report[code] = {
              'name':name,
              'category':category,
              'startUrl':start_url,
              'visited':pages,
              'pdfCandidates':candidates,
              'extractedPdfs':extracted,
            }
            time.sleep(0.2)

          (out / 'report.json').write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          summary = {
            code:{
              'name':value['name'],
              'category':value['category'],
              'startUrl':value['startUrl'],
              'visited':len(value['visited']),
              'candidates':len(value['pdfCandidates']),
              'extracted':len(value['extractedPdfs']),
              'top':value['extractedPdfs'][:5],
            }
            for code, value in report.items()
          }
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-12-discovery-${{ matrix.shard }}
          path: artifacts/batch-12-discovery/shard-${{ matrix.shard }}/
          retention-days: 14
