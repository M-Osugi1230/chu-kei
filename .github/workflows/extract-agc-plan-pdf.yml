name: Extract AGC Plan PDF

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/extract-agc-plan-pdf.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-02
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pypdf
      - name: Download and extract official plan PDF
        run: |
          mkdir -p artifacts
          python - <<'PY'
          import hashlib, json, urllib.request
          from pypdf import PdfReader
          url = 'https://ssl4.eir-parts.net/doc/5201/ir_material_for_fiscal_ym4/176339/00.pdf'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=60) as response:
              content = response.read()
          open('artifacts/agc-plus-2026.pdf', 'wb').write(content)
          reader = PdfReader('artifacts/agc-plus-2026.pdf')
          pages = []
          for index, page in enumerate(reader.pages, start=1):
              pages.append({'page': index, 'text': page.extract_text() or ''})
          result = {
              'url': url,
              'sha256': hashlib.sha256(content).hexdigest(),
              'bytes': len(content),
              'pageCount': len(reader.pages),
              'pages': pages,
          }
          open('artifacts/agc-plus-2026-pages.json', 'w', encoding='utf-8').write(json.dumps(result, ensure_ascii=False, indent=2))
          open('artifacts/agc-plus-2026-pages.txt', 'w', encoding='utf-8').write('\n\n'.join(f"=== PAGE {row['page']} ===\n{row['text']}" for row in pages))
          print(json.dumps({key: result[key] for key in ['url','sha256','bytes','pageCount']}, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: agc-plus-2026-pages
          path: |
            artifacts/agc-plus-2026-pages.json
            artifacts/agc-plus-2026-pages.txt
          retention-days: 7
