name: Apply Structured Source of Truth

on:
  pull_request:
    branches:
      - main
    paths:
      - 'operations/coverage-growth/**'
      - 'operations/patches/**'
      - 'operations/reviews/**'
      - 'operations/production-quality/**'
      - 'operations/source-research/**'
      - 'scripts/fetch_jpx_listed_companies_v1.py'
      - 'scripts/apply_company_coverage_1000_v1.mjs'
      - 'scripts/research_jpx_documents_v1.py'
      - 'scripts/normalize_source_research_candidates_v1.mjs'
      - 'scripts/summarize_source_research_candidates_v1.mjs'
      - 'scripts/generate_bulk_source_research_proposal_v1.mjs'
      - 'scripts/generate_source_research_recovery_proposal_v1.mjs'
      - 'scripts/prepare_bulk_source_research_approval_v1.mjs'
      - 'scripts/prepare_structured_candidate_approval_v1.mjs'
      - 'scripts/prepare_final_production_company_v1.mjs'
      - 'scripts/audit_production_readiness_v1.mjs'
      - 'scripts/apply_core_approval_batch_v1.mjs'
      - 'scripts/apply_core_evidence_repair_v1.mjs'
      - 'scripts/apply_production_approval_ledger_v1.mjs'
      - 'scripts/apply_production_promotion_v1.mjs'
      - 'scripts/sync_production_approval_metadata_v1.mjs'
      - 'scripts/apply_structured_expansion_ci_v1.mjs'
      - 'scripts/apply_structured_correction_v1.mjs'
      - 'scripts/align_metric_evidence_refs_v1.mjs'
      - 'scripts/validate_core_document_relevance_v1.mjs'
      - 'scripts/validate_source_registry_v1.mjs'
      - 'scripts/prepare_bulk_production_promotion_v1.mjs'
      - 'scripts/lib/quality_profile_v2.mjs'
      - 'scripts/validate_quality_score_v2.mjs'
      - 'scripts/apply_final200_ci_v1.mjs'
      - 'scripts/run_quality_pipeline_v43.mjs'
      - '.github/workflows/apply-structured-source-of-truth.yml'
      - 'package.json'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to apply and commit'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: apply-structured-source-${{ github.event.pull_request.head.ref || inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Resolve target branch
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ inputs.branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.branch }}
          fetch-depth: 0

      - name: Detect explicit apply request
        id: request
        shell: bash
        run: |
          if grep -R -E --include='*.json' '"runRequested"[[:space:]]*:[[:space:]]*true' operations >/dev/null 2>&1; then
            echo "requested=true" >> "$GITHUB_OUTPUT"
          else
            echo "requested=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pinned source-research dependencies
        shell: bash
        run: |
          python3 -m pip install --disable-pip-version-check --quiet \
            requests==2.32.3 \
            beautifulsoup4==4.12.3 \
            pypdf==5.1.0

      - name: Generate and validate source of truth
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          npm run quality:v43 2>&1 | tee artifacts/apply-structured-source.log
          node scripts/summarize_source_research_candidates_v1.mjs

      - name: Upload apply diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chu-kei-apply-structured-source-diagnostics
          path: artifacts/apply-structured-source.log
          if-no-files-found: error
          retention-days: 14

      - name: Remove transient files
        run: |
          rm -rf artifacts node_modules
          rm -f package-lock.json

      - name: Commit generated source of truth
        env:
          TARGET_BRANCH: ${{ steps.target.outputs.branch }}
          APPLY_REQUESTED: ${{ steps.request.outputs.requested }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          CURRENT_PRODUCTION="$(node -p "require('./operations/production-quality/production-readiness-v1.json').currentProduction")"
          TARGET_PRODUCTION="$(node -p "require('./operations/production-quality/production-quality-target-v1.json').targetProductionCompanies")"
          if [ "${CURRENT_PRODUCTION}" = "${TARGET_PRODUCTION}" ] && [ "${APPLY_REQUESTED}" = "false" ]; then
            echo "Production target is complete and no explicit request exists; validation-only run."
            git reset --hard HEAD
            exit 0
          fi
          git commit -m "quality: 本番品質${CURRENT_PRODUCTION}社の昇格監査を更新"
          git fetch origin "${TARGET_BRANCH}"
          git rebase "origin/${TARGET_BRANCH}"
          git push origin "HEAD:${TARGET_BRANCH}"
