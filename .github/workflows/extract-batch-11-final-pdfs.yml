name: Extract Batch 11 Final PDFs

on:
  push:
    branches:
      - data/structured-expansion-batch-11
    paths:
      - '.github/workflows/extract-batch-11-final-pdfs.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/extract-batch-11-final-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-11
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests pypdf
      - name: Download and extract official PDFs
        run: |
          mkdir -p artifacts/batch-11-final-pdfs
          python - <<'PY'
          import hashlib, json, re
          from pathlib import Path
          import requests
          from pypdf import PdfReader

          targets = {
            '4443': 'https://data.swcms.net/file/corp-sansan-ir/dam/jcr:a5996040-3388-490f-b671-b0929437c406/140120260410501595.pdf',
            '5253_plan': 'https://contents.xj-storage.jp/xcontents/AS05169/415de312/d30e/447f/931b/8ed43bcd300f/140120260514534197.pdf',
            '5253_results': 'https://contents.xj-storage.jp/xcontents/AS05169/78f50561/5e81/49b2/8f99/b9ee3dd1198b/20260609103958099s.pdf',
            '6777': 'https://ssl4.eir-parts.net/doc/6777/tdnet/2832501/00.pdf',
            '7826_vision': 'https://ssl4.eir-parts.net/doc/7826/ir_material_for_fiscal_ym5/184528/00.pdf',
            '7826_plan': 'https://ssl4.eir-parts.net/doc/7826/ir_material_for_fiscal_ym5/180928/00.pdf',
            '7826_results': 'https://ssl4.eir-parts.net/doc/7826/ir_material_for_fiscal_ym1/203136/00.pdf',
          }
          out = Path('artifacts/batch-11-final-pdfs')
          session = requests.Session()
          result = {}
          for code, url in targets.items():
            try:
              response = session.get(url, headers={'User-Agent':'Mozilla/5.0 (compatible; Chu-kei evidence audit/1.0)','Accept':'application/pdf,*/*;q=0.8'}, timeout=60, allow_redirects=True)
              response.raise_for_status()
              data = response.content
              if not data.startswith(b'%PDF'):
                raise RuntimeError(f'not PDF content-type={response.headers.get("content-type")} bytes={len(data)}')
              path = out / f'{code}.pdf'
              path.write_bytes(data)
              reader = PdfReader(path)
              rows=[]; hit_pages=[]
              for page_no,page in enumerate(reader.pages,1):
                text=re.sub(r'\s+',' ',(page.extract_text() or '').strip())
                if text:
                  rows.append({'page':page_no,'text':text[:22000]})
                  if re.search(r'(中期経営計画|長期経営計画|ビジョン|売上高|売上収益|ARR|営業利益|EBITDA|ROE|ROIC|設備投資|成長投資|M&A|配当|株主還元|自己株式取得|202[6-9]|2030)',text,re.I): hit_pages.append(page_no)
              (out/f'{code}.pages.json').write_text(json.dumps(rows,ensure_ascii=False,indent=2),encoding='utf-8')
              result[code]={'url':url,'pageCount':len(reader.pages),'textPages':len(rows),'hitPages':hit_pages,'metadata':{str(k):str(v) for k,v in (reader.metadata or {}).items()},'sha256':hashlib.sha256(data).hexdigest(),'bytes':len(data)}
            except Exception as error:
              result[code]={'url':url,'error':str(error)}
          (out/'summary.json').write_text(json.dumps(result,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(result,ensure_ascii=False,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: batch-11-final-pdfs
          path: artifacts/batch-11-final-pdfs/
          retention-days: 14
