name: Extract Batch 11 Sansan

on:
  push:
    branches:
      - data/structured-expansion-batch-11
    paths:
      - '.github/workflows/extract-batch-11-sansan.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/extract-batch-11-sansan.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-11
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests pypdf cryptography
      - name: Extract current official presentation
        run: |
          mkdir -p artifacts/batch-11-sansan
          python - <<'PY'
          import hashlib, json, re
          from pathlib import Path
          import requests
          from pypdf import PdfReader

          url='https://data.swcms.net/file/corp-sansan-ir/dam/jcr:a5996040-3388-490f-b671-b0929437c406/140120260410501595.pdf'
          out=Path('artifacts/batch-11-sansan')
          response=requests.get(url,headers={'User-Agent':'Mozilla/5.0 (compatible; Chu-kei evidence audit/1.0)'},timeout=60)
          response.raise_for_status(); data=response.content
          if not data.startswith(b'%PDF'): raise RuntimeError('not PDF')
          pdf=out/'sansan.pdf'; pdf.write_bytes(data); reader=PdfReader(pdf); rows=[]; hits=[]
          for page_no,page in enumerate(reader.pages,1):
            text=re.sub(r'\s+',' ',(page.extract_text() or '').strip())
            if text:
              rows.append({'page':page_no,'text':text[:22000]})
              if re.search(r'(中期|財務方針|売上高|売上収益|ARR|営業利益|調整後営業利益|ROE|ROIC|投資|M&A|配当|自己株式|2027|2028|2030)',text,re.I): hits.append(page_no)
          (out/'sansan.pages.json').write_text(json.dumps(rows,ensure_ascii=False,indent=2),encoding='utf-8')
          summary={'url':url,'pageCount':len(reader.pages),'textPages':len(rows),'hitPages':hits,'metadata':{str(k):str(v) for k,v in (reader.metadata or {}).items()},'sha256':hashlib.sha256(data).hexdigest(),'bytes':len(data)}
          (out/'summary.json').write_text(json.dumps(summary,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(summary,ensure_ascii=False,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: batch-11-sansan
          path: artifacts/batch-11-sansan/
          retention-days: 14
