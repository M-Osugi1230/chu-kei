name: Apply Structured Expansion Batch 08

on:
  push:
    branches:
      - data/structured-expansion-batch-08
    paths:
      - '.github/workflows/apply-structured-expansion-batch-08.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-08
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply deterministic patches and governance ledger
        run: |
          set -euo pipefail
          structured_count=$(node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const data = JSON.parse(zlib.gunzipSync(compressed));
          console.log(data.companies.filter(row => ['core', 'detailed_extracted'].includes(row.stage)).length);
          NODE
          )
          if [ "$structured_count" -eq 130 ]; then
            for patch in \
              operations/patches/yakult-midterm-2025-2030-20260713.json \
              operations/patches/komehyo-midterm-2025-2029-20260713.json \
              operations/patches/sumitomo-electric-midterm-2028-20260713.json \
              operations/patches/tdk-transformation-2025-2027-20260713.json \
              operations/patches/takashimaya-midterm-2024-2026-20260713.json
            do
              COMPANY_PATCH="$patch" node scripts/apply_company_data_patch_v1.mjs
            done
            GOVERNANCE_LEDGER_BATCH=operations/patches/structured-expansion-batch-08-ledger.json node scripts/apply_governance_ledger_batch_v1.mjs
            node scripts/rebuild_quality_scores_v2.mjs
            node scripts/normalize_bundle_contract_v1.mjs
          elif [ "$structured_count" -ne 135 ]; then
            echo "Unexpected structured count: $structured_count" >&2
            exit 1
          fi
      - name: Validate quality contracts
        run: |
          npm run quality:v43
          npm run quality:local
      - name: Commit generated source of truth
        run: |
          set -euo pipefail
          rm -rf artifacts
          rm -f .github/workflows/export-structured-expansion-batch-08-candidates.yml
          rm -f .github/workflows/discover-structured-expansion-batch-08.yml
          rm -f .github/workflows/apply-structured-expansion-batch-08.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: add Yakult Komehyo Sumitomo Electric TDK and Takashimaya plans"
          git push origin HEAD:data/structured-expansion-batch-08
