name: Apply Structured Expansion Batch 01

on:
  pull_request:
    branches:
      - main
    paths:
      - 'operations/patches/fujifilm-vision2030-20260711.json'
      - 'operations/patches/olc-2035-strategy-20260711.json'
      - 'operations/patches/structured-expansion-batch-01-ledger.json'
      - 'scripts/apply_governance_ledger_batch_v1.mjs'
      - 'scripts/validate_quality_v43.mjs'
      - 'scripts/validate_quality_score_v2.mjs'
      - 'scripts/validate_data_contract_v1.mjs'
      - 'scripts/validate_quality_dashboard_v1.mjs'
      - 'scripts/validate_quality_debt_budget_v1.mjs'
      - 'scripts/validate_review_governance_v1.mjs'
      - 'scripts/validate_source_registry_v1.mjs'
      - 'scripts/validate_progress_experience_v1.mjs'
      - '.github/workflows/apply-structured-expansion-batch-01.yml'
  push:
    branches:
      - data/structured-expansion-batch-01
    paths:
      - 'operations/patches/fujifilm-vision2030-20260711.json'
      - 'operations/patches/olc-2035-strategy-20260711.json'
      - 'operations/patches/structured-expansion-batch-01-ledger.json'
      - 'scripts/apply_governance_ledger_batch_v1.mjs'
      - 'scripts/validate_quality_v43.mjs'
      - 'scripts/validate_quality_score_v2.mjs'
      - 'scripts/validate_data_contract_v1.mjs'
      - 'scripts/validate_quality_dashboard_v1.mjs'
      - 'scripts/validate_quality_debt_budget_v1.mjs'
      - 'scripts/validate_review_governance_v1.mjs'
      - 'scripts/validate_source_registry_v1.mjs'
      - 'scripts/validate_progress_experience_v1.mjs'
      - '.github/workflows/apply-structured-expansion-batch-01.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-structured-expansion-batch-01
  cancel-in-progress: true

jobs:
  apply-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout expansion branch
        uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-01
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Detect existing application
        id: state
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const applied = ['4901', '4661'].every(code => data.companies.find(company => company.code === code)?.stage === 'detailed_extracted');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `already_applied=${applied}\n`);
          console.log(`already_applied=${applied}`);
          NODE

      - name: Apply governance ledger batch
        if: steps.state.outputs.already_applied != 'true'
        env:
          GOVERNANCE_LEDGER_BATCH: operations/patches/structured-expansion-batch-01-ledger.json
        run: node scripts/apply_governance_ledger_batch_v1.mjs

      - name: Apply deterministic company patches
        if: steps.state.outputs.already_applied != 'true'
        run: |
          COMPANY_PATCH=operations/patches/fujifilm-vision2030-20260711.json node scripts/apply_company_data_patch_v1.mjs
          COMPANY_PATCH=operations/patches/olc-2035-strategy-20260711.json node scripts/apply_company_data_patch_v1.mjs

      - name: Rebuild quality profiles and normalize bundle
        run: |
          node scripts/rebuild_quality_scores_v2.mjs
          node scripts/normalize_bundle_contract_v1.mjs

      - name: Validate v43 quality
        run: node scripts/validate_quality_v43.mjs

      - name: Validate quality scores
        run: node scripts/validate_quality_score_v2.mjs

      - name: Validate data contract
        run: node scripts/validate_data_contract_v1.mjs

      - name: Validate quality dashboard
        run: node scripts/validate_quality_dashboard_v1.mjs

      - name: Validate quality debt budget
        run: node scripts/validate_quality_debt_budget_v1.mjs

      - name: Validate review governance
        run: node scripts/validate_review_governance_v1.mjs

      - name: Validate source registry
        run: node scripts/validate_source_registry_v1.mjs

      - name: Validate progress experience
        run: node scripts/validate_progress_experience_v1.mjs

      - name: Verify structured population growth
        run: |
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          if (digest !== manifest.sha256) throw new Error('bundle digest mismatch');
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const counts = data.companies.reduce((result, company) => {
            result[company.stage] = (result[company.stage] || 0) + 1;
            return result;
          }, {});
          if (data.companies.length !== 570) throw new Error(`company count changed: ${data.companies.length}`);
          if (counts.core !== 30 || counts.detailed_extracted !== 72 || counts.source_indexed !== 98 || counts.jpx_indexed !== 370) {
            throw new Error(`unexpected stage counts: ${JSON.stringify(counts)}`);
          }
          for (const code of ['4901', '4661']) {
            const company = data.companies.find(row => row.code === code);
            if (!company || company.stage !== 'detailed_extracted' || !company.quality?.checks?.pageEvidence) {
              throw new Error(`structured expansion failed: ${code}`);
            }
          }
          console.log(JSON.stringify({ companyCount: data.companies.length, counts, structuredCount: counts.core + counts.detailed_extracted }, null, 2));
          NODE

      - name: Commit authoritative data and ledgers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data reports/v43/QUALITY_SCORE_V2_REPORT.json operations/reviews/decisions.json operations/corrections/corrections.json
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "data: add Fujifilm and Oriental Land structured plans"
            git push origin HEAD:data/structured-expansion-batch-01
          fi

      - name: Upload expansion diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chu-kei-structured-expansion-batch-01
          path: |
            artifacts/structured-expansion-batch-01-governance-report.json
            artifacts/fujifilm-vision2030-20260711-report.json
            artifacts/olc-2035-strategy-20260711-report.json
            artifacts/quality-debt-report-v1.json
            artifacts/quality-debt-items-v1.csv
            artifacts/review-governance-report-v1.json
            artifacts/source-registry-report-v1.json
            artifacts/progress-experience-v1.json
          if-no-files-found: warn
          retention-days: 90
