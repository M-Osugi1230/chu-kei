name: Probe Structured Expansion Batch 12 Fast

on:
  push:
    branches:
      - data/structured-expansion-batch-12
    paths:
      - '.github/workflows/probe-structured-expansion-batch-12-fast.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/probe-structured-expansion-batch-12-fast.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-12
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests beautifulsoup4 pypdf cryptography
      - name: Probe high confidence official materials
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          mkdir -p "artifacts/batch-12-fast/shard-${SHARD}"
          python - <<'PY'
          import hashlib, html, json, os, re, urllib.parse
          from pathlib import Path
          import requests
          from bs4 import BeautifulSoup
          from pypdf import PdfReader

          shard=int(os.environ['SHARD'])
          targets=[
            ('147A','ソラコム','情報・通信業','https://soracom.com/ja-jp/company/ir/'),
            ('2160','ジーエヌアイグループ','医薬品','https://www.gnipharma.com/ir/'),
            ('2702','日本マクドナルドホールディングス','小売業','https://www.mcd-holdings.co.jp/ir/'),
            ('290A','Synspective','情報・通信業','https://synspective.com/jp/ir/'),
            ('2998','クリアル','不動産業','https://corp.creal.jp/ir/'),
            ('3994','マネーフォワード','情報・通信業','https://corp.moneyforward.com/ir/'),
            ('4165','プレイド','情報・通信業','https://plaid.co.jp/ir/'),
            ('4324','電通グループ','サービス業','https://www.group.dentsu.com/jp/ir/'),
            ('4369','トリケミカル研究所','化学','https://www.trichemical.com/ir/'),
            ('4375','セーフィー','情報・通信業','https://safie.co.jp/ir/'),
            ('5038','eWeLL','情報・通信業','https://ewell.co.jp/ir/'),
            ('6146','ディスコ','機械','https://www.disco.co.jp/jp/ir/'),
            ('6227','AIメカテック','機械','https://www.ai-mech.com/ir/'),
            ('6264','マルマエ','機械','https://www.marumae.com/ir/'),
            ('6273','SMC','機械','https://www.smcworld.com/ir/'),
            ('6521','オキサイド','電気機器','https://www.opt-oxide.com/ir/'),
            ('6627','テラプローブ','電気機器','https://www.teraprobe.com/ir/'),
            ('6637','寺崎電気産業','電気機器','https://www.terasaki.co.jp/investor/'),
            ('6723','ルネサスエレクトロニクス','電気機器','https://www.renesas.com/jp/ja/about/investor-relations'),
            ('7214','GMB','輸送用機器','https://www.gmb.jp/ir-info/'),
            ('7373','アイドマ・ホールディングス','サービス業','https://www.aidma-hd.jp/ir/'),
            ('8198','マックスバリュ東海','小売業','https://www.mv-tokai.co.jp/company/profile/ir/'),
            ('8473','SBIホールディングス','証券、商品先物取引業','https://www.sbigroup.co.jp/investors/'),
            ('8704','トレイダーズホールディングス','証券、商品先物取引業','https://www.tradershd.com/ir/'),
            ('9022','東海旅客鉄道','陸運業','https://company.jr-central.co.jp/ir/'),
            ('9033','広島電鉄','陸運業','https://www.hiroden.co.jp/company/'),
            ('9380','東海運','倉庫・運輸関連業','https://www.azumaship.co.jp/ir/'),
            ('9708','帝国ホテル','サービス業','https://www.imperialhotel.co.jp/financial'),
            ('9761','東海リース','サービス業','https://www.tokai-lease.co.jp/ir/'),
            ('9972','アルテック','卸売業','https://www.altech.co.jp/ir/'),
          ]
          selected=[row for index,row in enumerate(targets) if index%5==shard]
          out=Path(f'artifacts/batch-12-fast/shard-{shard}')
          session=requests.Session(); session.headers.update({'User-Agent':'Mozilla/5.0 (compatible; Chu-kei official evidence audit/2.1)','Accept-Language':'ja,en;q=0.7'})
          positive=['中期経営計画','中長期経営計画','長期経営計画','経営計画','経営戦略','成長戦略','事業計画','成長可能性','財務方針','決算説明資料','決算説明会','統合報告','management plan','strategy','growth','presentation','financial results','2030','2029','2028','2027','2026']
          follow=['library','presentation','financial','strategy','plan','management','決算','説明','経営','IR資料','ir-library','ir_library']
          negative=['招集通知','株主総会','有価証券報告書','コーポレートガバナンス','定款','大量保有','PR情報']
          metric=re.compile(r'(中期経営計画|長期経営計画|成長可能性|売上高|売上収益|営業収益|ARR|営業利益|事業利益|経常利益|EBITDA|EBITA|ROE|ROIC|資本コスト|設備投資|成長投資|研究開発|M&A|配当性向|DOE|株主還元|自己株式取得|202[6-9]|2030)',re.I)
          def get(url,binary=False):
            r=session.get(url,timeout=22,allow_redirects=True); r.raise_for_status(); return r.content if binary else (r.text,r.url,r.headers.get('content-type',''))
          def same_host(url,host):
            current=(urllib.parse.urlparse(url).hostname or '').lower(); host=host.lower(); return current==host or current.endswith('.'+host)
          def score(label,url):
            text=html.unescape(f'{label} {url}').lower(); value=sum(6 for term in positive if term.lower() in text)-sum(12 for term in negative if term.lower() in text)
            if '.pdf' in text: value+=5
            return value
          result={}
          for code,name,category,start in selected:
            company=out/code; company.mkdir(parents=True,exist_ok=True); host=urllib.parse.urlparse(start).hostname or ''
            queue=[(start,0)]; seen=set(); pdfs={}; visited=[]
            while queue and len(seen)<16:
              url,depth=queue.pop(0)
              if url in seen or not same_host(url,host): continue
              seen.add(url)
              try: text,final,ctype=get(url)
              except Exception as error: visited.append({'url':url,'error':str(error)}); continue
              if 'pdf' in ctype.lower() or final.lower().split('?')[0].endswith('.pdf'):
                pdfs.setdefault(final,{'label':'','from':url,'linkScore':score('',final)}); continue
              visited.append({'url':final,'contentType':ctype})
              soup=BeautifulSoup(text,'html.parser')
              for node in soup.find_all(['a','iframe','embed','object']):
                raw=node.get('href') or node.get('src') or node.get('data')
                if not raw: continue
                absolute=urllib.parse.urljoin(final,html.unescape(raw)); label=' '.join(node.get_text(' ',strip=True).split()); combined=f'{label} {absolute}'.lower(); value=score(label,absolute)
                if '.pdf' in absolute.lower() or 'pdf' in (node.get('type') or '').lower():
                  if value>=5:
                    previous=pdfs.get(absolute); candidate={'label':label,'from':final,'linkScore':value}
                    if previous is None or value>previous['linkScore']: pdfs[absolute]=candidate
                elif depth<2 and same_host(absolute,host) and any(term.lower() in combined for term in follow): queue.append((absolute,depth+1))
              for match in re.findall(r'(?:https?:)?//[^\s"\'<>]+\.pdf(?:\?[^\s"\'<>]*)?|[/A-Za-z0-9_.~%-]+\.pdf(?:\?[^\s"\'<>]*)?',text,re.I):
                absolute=urllib.parse.urljoin(final,html.unescape(match)); value=score('',absolute)
                if value>=5: pdfs.setdefault(absolute,{'label':'','from':final,'linkScore':value})
            candidates=sorted(({'url':url,**meta} for url,meta in pdfs.items()),key=lambda row:(-row['linkScore'],row['url']))[:10]; extracted=[]
            for index,item in enumerate(candidates):
              try:
                data=get(item['url'],True)
                if not data.startswith(b'%PDF') or len(data)>35_000_000: continue
                pdf=company/f'{index:02d}.pdf'; pdf.write_bytes(data); reader=PdfReader(pdf); rows=[]; hits=[]; numeric_pages=[]
                for page_no,page in enumerate(reader.pages,1):
                  text=re.sub(r'\s+',' ',(page.extract_text() or '').strip())
                  if text:
                    rows.append({'page':page_no,'text':text[:22000]})
                    found=metric.findall(text); hits.extend(found)
                    if found: numeric_pages.append(page_no)
                pages_file=company/f'{index:02d}.pages.json'; pages_file.write_text(json.dumps(rows,ensure_ascii=False,indent=2),encoding='utf-8')
                unique=set(hits); content_score=len(hits)+25*bool(re.search(r'(中期経営計画|長期経営計画|成長可能性|経営戦略)', '\n'.join(r['text'] for r in rows),re.I))+10*len(unique)
                extracted.append({**item,'file':pdf.name,'pagesFile':pages_file.name,'pageCount':len(reader.pages),'textPages':len(rows),'contentScore':content_score,'metricTypes':sorted(unique),'evidencePages':numeric_pages[:160],'metadata':{str(k):str(v) for k,v in (reader.metadata or {}).items()},'bytes':len(data),'sha256':hashlib.sha256(data).hexdigest()})
              except Exception as error: item['error']=str(error)
            extracted.sort(key=lambda row:(-row['contentScore'],-row['linkScore'],row['url']))
            result[code]={'name':name,'category':category,'startUrl':start,'visited':visited,'pdfCandidates':candidates,'extractedPdfs':extracted}
          (out/'report.json').write_text(json.dumps(result,ensure_ascii=False,indent=2),encoding='utf-8')
          summary={code:{'name':v['name'],'category':v['category'],'startUrl':v['startUrl'],'visited':len(v['visited']),'candidates':len(v['pdfCandidates']),'extracted':len(v['extractedPdfs']),'top':v['extractedPdfs'][:4]} for code,v in result.items()}
          (out/'summary.json').write_text(json.dumps(summary,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(summary,ensure_ascii=False,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-12-fast-${{ matrix.shard }}
          path: artifacts/batch-12-fast/shard-${{ matrix.shard }}/
          retention-days: 14
