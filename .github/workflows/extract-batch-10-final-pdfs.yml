name: Extract Batch 10 Final PDFs

on:
  push:
    branches:
      - data/structured-expansion-batch-10
    paths:
      - '.github/workflows/extract-batch-10-final-pdfs.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/extract-batch-10-final-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-10
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests pypdf
      - name: Download and extract official PDFs
        run: |
          mkdir -p artifacts/batch-10-final-pdfs
          python - <<'PY'
          import hashlib, json, re
          from pathlib import Path
          import requests
          from pypdf import PdfReader

          targets = {
            '7685': {
              'url': 'https://ssl4.eir-parts.net/doc/7685/tdnet/2811284/00.pdf',
              'referer': 'https://buysell-technologies.com/ir/settlement/'
            },
            '6963': {
              'url': 'https://fscdn.rohm.com/jp/financial/account/2603_presentation_jp.pdf',
              'referer': 'https://www.rohm.co.jp/ir/library/materials-for-financial-results-briefing'
            },
            '6963_midterm': {
              'url': 'https://fscdn.rohm.com/jp/financial/account/2509_10200916_presentation_jp.pdf',
              'referer': 'https://www.rohm.co.jp/ir/library/materials-for-financial-results-briefing'
            }
          }
          out = Path('artifacts/batch-10-final-pdfs')
          result = {}
          for code, target in targets.items():
            try:
              headers = {
                'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/140 Safari/537.36',
                'Accept': 'application/pdf,*/*;q=0.8',
                'Referer': target['referer'],
              }
              response = requests.get(target['url'], headers=headers, timeout=60, allow_redirects=True)
              response.raise_for_status()
              data = response.content
              if not data.startswith(b'%PDF'):
                raise RuntimeError(f'not a PDF content-type={response.headers.get("content-type")} bytes={len(data)}')
              path = out / f'{code}.pdf'
              path.write_bytes(data)
              reader = PdfReader(path)
              rows = []
              hits = []
              for page_no, page in enumerate(reader.pages, 1):
                text = re.sub(r'\s+', ' ', (page.extract_text() or '').strip())
                if text:
                  rows.append({'page': page_no, 'text': text[:20000]})
                  if re.search(r'(中期経営計画|売上高|営業利益|EBITDA|ROE|ROIC|設備投資|成長投資|M&A|配当|株主還元|自己株式取得|2027|2028)', text, re.I):
                    hits.append(page_no)
              pages_path = out / f'{code}.pages.json'
              pages_path.write_text(json.dumps(rows, ensure_ascii=False, indent=2), encoding='utf-8')
              result[code] = {
                'url': target['url'],
                'finalUrl': response.url,
                'status': response.status_code,
                'contentType': response.headers.get('content-type'),
                'pageCount': len(reader.pages),
                'textPages': len(rows),
                'hitPages': hits,
                'metadata': {str(k): str(v) for k, v in (reader.metadata or {}).items()},
                'sha256': hashlib.sha256(data).hexdigest(),
              }
            except Exception as error:
              result[code] = {'url': target['url'], 'error': str(error)}
          (out / 'summary.json').write_text(json.dumps(result, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: batch-10-final-pdfs
          path: artifacts/batch-10-final-pdfs/
          retention-days: 14
