name: Apply Verified Normalized Bundle Once

on:
  push:
    branches:
      - fix/data-contract-and-site-v15-sync
    paths:
      - '.github/workflows/apply-normalized-bundle-once.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/data-contract-and-site-v15-sync
          fetch-depth: 0

      - name: Download verified normalized bundle
        uses: actions/download-artifact@v4
        with:
          name: chu-kei-normalized-bundle
          run-id: 29146576979
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/chu-kei-normalized

      - name: Apply generated data and reports
        shell: bash
        run: |
          test -f /tmp/chu-kei-normalized/site/data/bundle.manifest.json
          rm -f site/data/bundle.gz.part*
          cp -a /tmp/chu-kei-normalized/site/data/. site/data/
          cp /tmp/chu-kei-normalized/reports/v43/QUALITY_SCORE_V2_REPORT.json reports/v43/QUALITY_SCORE_V2_REPORT.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify applied bundle
        run: |
          node scripts/validate_quality_v43.mjs
          node scripts/validate_quality_score_v2.mjs
          node scripts/validate_data_contract_v1.mjs
          node scripts/validate_quality_dashboard_v1.mjs

      - name: Commit verified generated data
        shell: bash
        run: |
          rm .github/workflows/apply-normalized-bundle-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data reports/v43/QUALITY_SCORE_V2_REPORT.json .github/workflows/apply-normalized-bundle-once.yml
          git commit -m "build: apply verified quality v2 bundle"
          git push origin HEAD:fix/data-contract-and-site-v15-sync
