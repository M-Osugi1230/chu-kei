name: Materialize Structured Expansion Batch 03

on:
  push:
    branches:
      - data/structured-expansion-batch-03
    paths:
      - '.github/workflows/materialize-structured-expansion-batch-03.yml'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-03
          fetch-depth: 0
      - name: Write remaining deterministic patches and governance ledger
        run: |
          mkdir -p operations/patches
          cat <<'B64' | base64 -d > /tmp/batch03.tgz

B64
          tar -xzf /tmp/batch03.tgz -C operations/patches
          python - <<'PY'
          import json, glob
          for path in glob.glob('operations/patches/*20260712.json') + ['operations/patches/structured-expansion-batch-03-ledger.json']:
              with open(path, encoding='utf-8') as handle:
                  json.load(handle)
              print(path)
          PY
      - name: Commit materialized files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add operations/patches
          git commit -m "data: add batch 03 structured plan patches and ledger"
          git push origin HEAD:data/structured-expansion-batch-03
