name: Import v42 package as v43 site

on:
  push:
    branches:
      - feat/v43-site-import-safe
    paths:
      - imports/v42/chukei_570_company_operations_v42.zip
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-site:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify source and generate v43 site
        run: python scripts/run_v42_import.py

      - name: Run strict v43 quality gate
        run: npm run quality:v43

      - name: Commit generated site
        shell: bash
        run: |
          if git diff --quiet -- site; then
            echo "No generated site changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          git commit -m "build: generate v43 quality hardened site"
          git push origin "HEAD:${GITHUB_REF_NAME}"
