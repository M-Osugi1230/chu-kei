name: Export Structured Expansion Batch 06 Targets

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/export-structured-expansion-batch-06-targets.yml'
  push:
    branches:
      - data/structured-expansion-batch-06
    paths:
      - '.github/workflows/export-structured-expansion-batch-06-targets.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-06
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Export complete target records
        run: |
          mkdir -p artifacts
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import zlib from 'node:zlib';

          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          if (digest !== manifest.sha256) throw new Error(`bundle digest mismatch: ${digest}`);

          const data = JSON.parse(zlib.gunzipSync(compressed));
          const targetCodes = ['1802', '4612', '5333', '6479', '9602'];
          const companies = targetCodes.map(code => data.companies.find(company => String(company.code) === code));
          const missing = targetCodes.filter((code, index) => !companies[index]);
          if (missing.length) throw new Error(`missing target companies: ${missing.join(', ')}`);
          for (const company of companies) {
            if (company.stage !== 'source_indexed') {
              throw new Error(`target is not source_indexed: ${company.code} ${company.stage}`);
            }
          }

          const output = {
            generatedAt: new Date().toISOString(),
            manifest: {
              sha256: manifest.sha256,
              companyCount: manifest.companyCount,
              progressCount: manifest.progressCount,
            },
            targetCodes,
            companies,
          };
          fs.writeFileSync('artifacts/structured-expansion-batch-06-targets.json', `${JSON.stringify(output, null, 2)}\n`);
          console.log(JSON.stringify({ targetCodes, companyCount: companies.length, bundleSha256: digest }, null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-06-targets
          path: artifacts/structured-expansion-batch-06-targets.json
          retention-days: 14
