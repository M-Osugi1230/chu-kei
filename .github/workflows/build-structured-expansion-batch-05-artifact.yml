name: Build Structured Expansion Batch 05 Artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - 'operations/patches/*20260712.json'
      - '.github/workflows/build-structured-expansion-batch-05-artifact.yml'
  push:
    branches:
      - data/structured-expansion-batch-05
    paths:
      - '.github/workflows/build-structured-expansion-batch-05-artifact.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout expansion branch
        uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-05

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Detect current state
        id: state
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const codes = ['1801', '2002', '5711', '7532', '9005'];
          const applied = codes.every(code => data.companies.find(company => String(company.code) === code)?.stage === 'detailed_extracted');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `already_applied=${applied}\n`);
          console.log(`already_applied=${applied}`);
          NODE

      - name: Apply governance and company patches
        if: steps.state.outputs.already_applied != 'true'
        run: |
          GOVERNANCE_LEDGER_BATCH=operations/patches/structured-expansion-batch-05-ledger.json node scripts/apply_governance_ledger_batch_v1.mjs
          COMPANY_PATCH=operations/patches/taisei-midterm-2024-2026-20260712.json node scripts/apply_company_data_patch_v1.mjs
          COMPANY_PATCH=operations/patches/nisshin-seifun-plan-2026-revision-20260712.json node scripts/apply_company_data_patch_v1.mjs
          COMPANY_PATCH=operations/patches/mitsubishi-materials-strategy-2026-2028-20260712.json node scripts/apply_company_data_patch_v1.mjs
          COMPANY_PATCH=operations/patches/ppih-double-impact-2035-20260712.json node scripts/apply_company_data_patch_v1.mjs
          COMPANY_PATCH=operations/patches/tokyu-midterm-2024-2026-20260712.json node scripts/apply_company_data_patch_v1.mjs

      - name: Rebuild and validate
        run: |
          node scripts/rebuild_quality_scores_v2.mjs
          node scripts/normalize_bundle_contract_v1.mjs
          node scripts/validate_quality_v43.mjs
          node scripts/validate_quality_score_v2.mjs
          node scripts/validate_data_contract_v1.mjs
          node scripts/validate_quality_dashboard_v1.mjs
          node scripts/validate_quality_debt_budget_v1.mjs
          node scripts/validate_review_governance_v1.mjs
          node scripts/validate_source_registry_v1.mjs
          node scripts/validate_progress_experience_v1.mjs

      - name: Verify final counts and evidence
        run: |
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          import { execFileSync } from 'node:child_process';
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          if (digest !== manifest.sha256) throw new Error('bundle digest mismatch');
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const counts = data.companies.reduce((out, row) => ({ ...out, [row.stage]: (out[row.stage] || 0) + 1 }), {});
          const expected = { core: 30, detailed_extracted: 90, source_indexed: 80, jpx_indexed: 370 };
          for (const [stage, count] of Object.entries(expected)) if (counts[stage] !== count) throw new Error(`${stage}=${counts[stage]} expected=${count}`);
          for (const code of ['1801', '2002', '5711', '7532', '9005']) {
            const company = data.companies.find(row => String(row.code) === code);
            if (!company || company.stage !== 'detailed_extracted' || !company.quality?.checks?.pageEvidence) throw new Error(`structured expansion failed: ${code}`);
          }
          const result = {
            companyCount: data.companies.length,
            structuredCount: 120,
            sourceConfirmed: 200,
            counts,
            sha256: digest,
            parentCommitSha: execFileSync('git', ['rev-parse', 'HEAD'], { encoding: 'utf8' }).trim(),
            baseTreeSha: execFileSync('git', ['rev-parse', 'HEAD^{tree}'], { encoding: 'utf8' }).trim()
          };
          fs.mkdirSync('artifacts', { recursive: true });
          fs.writeFileSync('artifacts/batch-05-final-result.json', `${JSON.stringify(result, null, 2)}\n`);
          console.log(JSON.stringify(result, null, 2));
          NODE

      - name: Upload authoritative generated files
        uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-05-authoritative
          path: |
            site/data/bundle.manifest.json
            site/data/bundle.gz.part*
            reports/v43/QUALITY_SCORE_V2_REPORT.json
            operations/reviews/decisions.json
            operations/corrections/corrections.json
            artifacts/batch-05-final-result.json
            artifacts/quality-debt-report-v1.json
            artifacts/review-governance-report-v1.json
            artifacts/source-registry-report-v1.json
          retention-days: 14
