name: Discover Structured Expansion Batch 09 Alternates

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/discover-structured-expansion-batch-09-alternates.yml'
  push:
    branches:
      - data/structured-expansion-batch-09
    paths:
      - '.github/workflows/discover-structured-expansion-batch-09-alternates.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-09
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests beautifulsoup4 pypdf
      - name: Discover and score official plan materials
        run: |
          python - <<'PY'
          import hashlib
          import html
          import json
          import re
          import urllib.parse
          from pathlib import Path

          import requests
          from bs4 import BeautifulSoup
          from pypdf import PdfReader

          out = Path('artifacts/structured-expansion-batch-09-alternates')
          out.mkdir(parents=True, exist_ok=True)
          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (compatible; Chu-kei official evidence audit/1.0)',
              'Accept-Language': 'ja,en-US;q=0.8,en;q=0.6',
          })

          targets = {
              '215A': {'name': 'タイミー', 'starts': ['https://corp.timee.co.jp/ir/', 'https://corp.timee.co.jp/ir/library/'], 'domains': ['corp.timee.co.jp']},
              '2587': {'name': 'サントリービバレッジ&フード', 'starts': ['https://www.suntory.co.jp/softdrink/ir/', 'https://www.suntory.co.jp/softdrink/ir/library/'], 'domains': ['suntory.co.jp']},
              '2914': {'name': '日本たばこ産業', 'starts': ['https://www.jti.co.jp/investors/', 'https://www.jti.co.jp/investors/library/'], 'domains': ['jti.co.jp']},
              '2998': {'name': 'クリアル', 'starts': ['https://corp.creal.jp/ir/', 'https://corp.creal.jp/ir/library/'], 'domains': ['corp.creal.jp']},
              '3994': {'name': 'マネーフォワード', 'starts': ['https://corp.moneyforward.com/ir/', 'https://corp.moneyforward.com/ir/library/'], 'domains': ['corp.moneyforward.com']},
              '4970': {'name': '東洋合成工業', 'starts': ['https://www.toyogosei.co.jp/ir/', 'https://www.toyogosei.co.jp/ir/library/'], 'domains': ['toyogosei.co.jp']},
              '5253': {'name': 'カバー', 'starts': ['https://cover-corp.com/ir', 'https://cover-corp.com/ir/news'], 'domains': ['cover-corp.com']},
              '6637': {'name': '寺崎電気産業', 'starts': ['https://www.terasaki.co.jp/investor/', 'https://www.terasaki.co.jp/investor/library/'], 'domains': ['terasaki.co.jp']},
              '6890': {'name': 'フェローテック', 'starts': ['https://www.ferrotec.co.jp/ir/ir_ml_plans.php', 'https://www.ferrotec.co.jp/ir/'], 'domains': ['ferrotec.co.jp'], 'direct': ['https://www.ferrotec.co.jp/php/download.php?f=jp%2F66a0ba9bc5ef1.pdf']},
              '6963': {'name': 'ローム', 'starts': ['https://www.rohm.co.jp/ir', 'https://www.rohm.co.jp/company/about/philosophy/mediumterm-management-plan'], 'domains': ['rohm.co.jp']},
              '7287': {'name': '日本精機', 'starts': ['https://www.nippon-seiki.co.jp/ir/', 'https://www.nippon-seiki.co.jp/ir/library/'], 'domains': ['nippon-seiki.co.jp']},
              '7685': {'name': 'BuySell Technologies', 'starts': ['https://buysell-technologies.com/ir/', 'https://buysell-technologies.com/ir/plan/', 'https://buysell-technologies.com/ir/library/'], 'domains': ['buysell-technologies.com']},
              '8198': {'name': 'マックスバリュ東海', 'starts': ['https://www.mv-tokai.co.jp/company/profile/ir/', 'https://www.mv-tokai.co.jp/company/profile/ir/library/'], 'domains': ['mv-tokai.co.jp']},
              '8473': {'name': 'SBIホールディングス', 'starts': ['https://www.sbigroup.co.jp/investors/', 'https://www.sbigroup.co.jp/investors/library/'], 'domains': ['sbigroup.co.jp']},
          }

          link_keys = ['中期', '長期', '経営計画', '経営戦略', '成長戦略', '事業計画', 'management', 'strategy', 'plan', '説明会', '決算', '資本', 'vision', '2028', '2027', '2026']
          content_patterns = {
              'plan': r'(中期経営計画|中長期経営計画|長期経営計画|経営戦略|成長戦略|事業計画|medium.?term|mid.?term|long.?term)',
              'revenue': r'(売上高|売上収益|売上|revenue)',
              'profit': r'(営業利益|事業利益|経常利益|EBITDA|operating profit)',
              'capital_efficiency': r'(ROE|ROIC|ROCE|PBR|資本効率)',
              'investment': r'(設備投資|成長投資|戦略投資|研究開発|M&A|投資総額)',
              'return': r'(配当性向|DOE|総還元性向|株主還元|自己株式取得|累進配当)',
              'future_year': r'(202[6-9]|203[0-5])年?度?',
          }

          def allowed(url, domains):
              host = (urllib.parse.urlparse(url).hostname or '').lower()
              return any(host == domain or host.endswith('.' + domain) for domain in domains)

          def request(url, binary=False):
              response = session.get(url, timeout=45, allow_redirects=True)
              response.raise_for_status()
              return response.content if binary else (response.text, response.url, response.headers.get('content-type', ''))

          def link_score(label, url):
              value = html.unescape(f'{label} {url}').lower().replace(' ', '')
              score = sum(5 for key in link_keys if key.lower().replace(' ', '') in value)
              if any(word in value for word in ['招集通知', '有価証券報告書', '決算短信', 'コーポレートガバナンス']):
                  score -= 8
              if '統合報告' in value or 'integrated' in value:
                  score -= 2
              return score

          def content_score(page_rows):
              joined = '\n'.join(row['text'] for row in page_rows[:120])
              hits = {key: bool(re.search(pattern, joined, re.I)) for key, pattern in content_patterns.items()}
              score = sum({
                  'plan': 30,
                  'revenue': 12,
                  'profit': 12,
                  'capital_efficiency': 12,
                  'investment': 12,
                  'return': 12,
                  'future_year': 10,
              }[key] for key, value in hits.items() if value)
              return score, hits

          result = {}
          for code, target in targets.items():
              company_dir = out / code
              company_dir.mkdir(exist_ok=True)
              queue = [(url, 0) for url in target['starts']]
              seen = set()
              pages = []
              pdfs = {url: {'label': 'direct official PDF', 'from': target['starts'][0], 'linkScore': 50} for url in target.get('direct', [])}

              while queue and len(seen) < 70:
                  url, depth = queue.pop(0)
                  if url in seen or not allowed(url, target['domains']):
                      continue
                  seen.add(url)
                  try:
                      text, final, content_type = request(url)
                  except Exception as error:
                      pages.append({'url': url, 'error': str(error)})
                      continue
                  if 'pdf' in content_type.lower() or final.lower().split('?')[0].endswith('.pdf'):
                      pdfs.setdefault(final, {'label': '', 'from': url, 'linkScore': link_score('', final)})
                      continue
                  pages.append({'url': final, 'contentType': content_type})
                  soup = BeautifulSoup(text, 'html.parser')
                  for node in soup.find_all(['a', 'iframe', 'embed', 'object']):
                      raw = node.get('href') or node.get('src') or node.get('data')
                      if not raw:
                          continue
                      absolute = urllib.parse.urljoin(final, html.unescape(raw))
                      label = ' '.join(node.get_text(' ', strip=True).split())
                      combined = f'{label} {absolute}'.lower()
                      if '.pdf' in absolute.lower() or 'pdf' in (node.get('type') or '').lower():
                          candidate = {'label': label, 'from': final, 'linkScore': link_score(label, absolute)}
                          previous = pdfs.get(absolute)
                          if previous is None or candidate['linkScore'] > previous['linkScore']:
                              pdfs[absolute] = candidate
                      elif depth < 3 and allowed(absolute, target['domains']) and any(key.lower() in combined for key in link_keys):
                          queue.append((absolute, depth + 1))
                  for match in re.findall(r'(?:https?:)?//[^\s"\'<>]+\.pdf(?:\?[^\s"\'<>]*)?|[/A-Za-z0-9_.-]+\.pdf(?:\?[^\s"\'<>]*)?', text, re.I):
                      absolute = urllib.parse.urljoin(final, html.unescape(match))
                      pdfs.setdefault(absolute, {'label': '', 'from': final, 'linkScore': link_score('', absolute)})

              ranked_links = sorted(({'url': url, **meta} for url, meta in pdfs.items()), key=lambda row: (-row['linkScore'], row['url']))[:18]
              extracted = []
              for index, item in enumerate(ranked_links):
                  try:
                      binary = request(item['url'], binary=True)
                      if not binary.startswith(b'%PDF') or len(binary) > 35_000_000:
                          continue
                      pdf_file = company_dir / f'{index:02d}.pdf'
                      pdf_file.write_bytes(binary)
                      reader = PdfReader(pdf_file)
                      page_rows = []
                      evidence_pages = []
                      for page_number, page in enumerate(reader.pages, start=1):
                          text = re.sub(r'\s+', ' ', (page.extract_text() or '').strip())
                          if not text:
                              continue
                          page_rows.append({'page': page_number, 'text': text[:15000]})
                          if re.search(r'(中期経営計画|長期経営計画|売上高|営業利益|ROE|ROIC|設備投資|成長投資|配当性向|株主還元|自己株式取得)', text, re.I):
                              evidence_pages.append(page_number)
                      pages_file = company_dir / f'{index:02d}.pages.json'
                      pages_file.write_text(json.dumps(page_rows, ensure_ascii=False, indent=2), encoding='utf-8')
                      score, content_hits = content_score(page_rows)
                      extracted.append({
                          **item,
                          'file': pdf_file.name,
                          'pagesFile': pages_file.name,
                          'pageCount': len(reader.pages),
                          'textPages': len(page_rows),
                          'contentScore': score,
                          'contentHits': content_hits,
                          'evidencePages': evidence_pages[:100],
                          'bytes': len(binary),
                          'sha256': hashlib.sha256(binary).hexdigest(),
                      })
                  except Exception as error:
                      item['error'] = str(error)

              extracted.sort(key=lambda row: (-row['contentScore'], -row['linkScore'], row['url']))
              result[code] = {
                  'name': target['name'],
                  'visited': pages,
                  'pdfCandidates': ranked_links,
                  'extractedPdfs': extracted,
              }

          (out / 'report.json').write_text(json.dumps(result, ensure_ascii=False, indent=2), encoding='utf-8')
          summary = {
              code: {
                  'name': value['name'],
                  'visited': len(value['visited']),
                  'candidates': len(value['pdfCandidates']),
                  'extracted': len(value['extractedPdfs']),
                  'best': value['extractedPdfs'][0] if value['extractedPdfs'] else None,
              }
              for code, value in result.items()
          }
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-09-alternates
          path: artifacts/structured-expansion-batch-09-alternates/
          retention-days: 14
