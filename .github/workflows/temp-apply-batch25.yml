name: Temporary Apply Batch 25

on:
  push:
    branches:
      - quality/apply-batch-25

permissions:
  contents: write

concurrency:
  group: temporary-apply-batch-25
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: quality/apply-batch-25
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply and validate batch 25
        shell: bash
        run: |
          set -euo pipefail
          GITHUB_WORKFLOW='Apply Structured Source of Truth' npm run quality:v43
      - name: Commit generated source of truth
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo 'No generated changes to commit'
            exit 0
          fi
          git commit -m 'quality: 第25バッチの本番品質データを生成'
          git push origin HEAD:quality/apply-batch-25
