name: Research Final 10 Lightweight Temporary

on:
  push:
    branches:
      - data/structured-expansion-batch-13c
    paths:
      - '.github/workflows/research-final10-lightweight-temporary.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-13c
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm install --no-save playwright@1.55.0
      - run: npx playwright install --with-deps chromium
      - run: pip install requests pypdf cryptography
      - name: Collect official links from remaining companies
        run: |
          mkdir -p artifacts/final10-links operations/research
          cat > /tmp/collect-final10.mjs <<'NODE'
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          import { chromium } from 'playwright';

          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const companies = data.companies.filter(row => row.stage === 'source_indexed').map(row => ({ code: String(row.code), name: row.name, startUrl: row.sourceUrl }));
          if (companies.length !== 10) throw new Error(`Expected 10 source-indexed companies, got ${companies.length}`);

          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({ locale: 'ja-JP', userAgent: 'Mozilla/5.0 (compatible; Chu-kei official IR audit/5.0)' });
          const report = {};
          const internalPattern = /ir|investor|financial|library|result|report|presentation|document|material|settlement|earnings/i;
          for (const company of companies) {
            const startHost = new URL(company.startUrl).hostname.replace(/^www\./, '');
            const queue = [company.startUrl];
            const visited = new Set();
            const pages = [];
            while (queue.length && visited.size < 6) {
              const url = queue.shift();
              if (visited.has(url)) continue;
              visited.add(url);
              const page = await context.newPage();
              const responses = [];
              page.on('response', response => {
                const contentType = response.headers()['content-type'] || '';
                if (/pdf/i.test(contentType) || /\.pdf(?:$|[?#])/i.test(response.url())) responses.push({ url: response.url(), contentType });
              });
              try {
                await page.goto(url, { waitUntil: 'networkidle', timeout: 45000 });
                await page.waitForTimeout(1200);
                const links = await page.locator('a[href]').evaluateAll(anchors => anchors.map(a => ({ text: (a.textContent || '').trim(), href: a.href })));
                pages.push({ url: page.url(), title: await page.title(), links, responses });
                for (const link of links) {
                  try {
                    const parsed = new URL(link.href);
                    const host = parsed.hostname.replace(/^www\./, '');
                    const sameSite = host === startHost || host.endsWith(`.${startHost}`);
                    if (sameSite && !/\.pdf(?:$|[?#])/i.test(link.href) && internalPattern.test(`${link.text} ${link.href}`) && !visited.has(link.href)) queue.push(link.href);
                  } catch {}
                }
              } catch (error) {
                pages.push({ url, error: String(error), links: [], responses });
              } finally {
                await page.close();
              }
            }
            report[company.code] = { ...company, pages };
          }
          await browser.close();
          fs.writeFileSync('artifacts/final10-links/report.json', JSON.stringify(report, null, 2));
          NODE
          node /tmp/collect-final10.mjs
      - name: Rank and inspect only top official PDFs
        run: |
          python scripts/rank_official_ir_candidates_v2.py \
            --links-report artifacts/final10-links/report.json \
            --output operations/research/final10-ranked-evidence.json \
            --max-per-company 3 \
            --max-pages 140
      - name: Commit compact evidence only
        run: |
          rm -f .github/workflows/research-final10-lightweight-temporary.yml
          rm -rf node_modules artifacts
          rm -f package-lock.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "research: rank official evidence for final 10 companies"
          git push origin HEAD:data/structured-expansion-batch-13c
