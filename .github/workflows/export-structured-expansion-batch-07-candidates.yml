name: Export Structured Expansion Batch 07 Candidates

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/export-structured-expansion-batch-07-candidates.yml'
  push:
    branches:
      - data/structured-expansion-batch-07
    paths:
      - '.github/workflows/export-structured-expansion-batch-07-candidates.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-07
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Export source-indexed companies
        run: |
          mkdir -p artifacts
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import zlib from 'node:zlib';

          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          if (digest !== manifest.sha256) throw new Error(`bundle digest mismatch: ${digest}`);

          const data = JSON.parse(zlib.gunzipSync(compressed));
          const sourceIndexed = data.companies
            .filter(company => company.stage === 'source_indexed')
            .map(company => ({
              code: company.code,
              name: company.name,
              market: company.market,
              industry: company.industry,
              category: company.category,
              sourceUrl: company.sourceUrl,
              document: company.document,
              planPublishedDate: company.planPublishedDate,
              lastVerifiedDate: company.lastVerifiedDate,
              themes: company.themes,
              summary: company.summary,
              revenue: company.revenue,
              profit: company.profit,
              margin: company.margin,
              capital: company.capital,
              returnPolicy: company.returnPolicy,
              evidenceRefs: company.evidenceRefs,
              flags: company.flags,
            }))
            .sort((left, right) => String(left.code).localeCompare(String(right.code), 'ja'));

          if (sourceIndexed.length !== 75) {
            throw new Error(`unexpected source-indexed count: ${sourceIndexed.length}`);
          }

          const byIndustry = Object.fromEntries(
            [...new Set(sourceIndexed.map(row => row.industry))]
              .sort((a, b) => String(a).localeCompare(String(b), 'ja'))
              .map(industry => [industry, sourceIndexed.filter(row => row.industry === industry).length])
          );

          const output = {
            generatedAt: new Date().toISOString(),
            manifest: {
              sha256: manifest.sha256,
              companyCount: manifest.companyCount,
              progressCount: manifest.progressCount,
              structuredCount: data.companies.filter(row => ['core', 'detailed_extracted'].includes(row.stage)).length,
              sourceConfirmedCount: data.companies.filter(row => row.stage !== 'jpx_indexed').length,
            },
            sourceIndexedCount: sourceIndexed.length,
            byIndustry,
            companies: sourceIndexed,
          };

          if (output.manifest.structuredCount !== 125) throw new Error(`unexpected structured count: ${output.manifest.structuredCount}`);
          if (output.manifest.sourceConfirmedCount !== 200) throw new Error(`unexpected source-confirmed count: ${output.manifest.sourceConfirmedCount}`);

          fs.writeFileSync('artifacts/structured-expansion-batch-07-candidates.json', `${JSON.stringify(output, null, 2)}\n`);
          console.log(JSON.stringify({ manifest: output.manifest, sourceIndexedCount: output.sourceIndexedCount, industryCount: Object.keys(byIndustry).length }, null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-07-candidates
          path: artifacts/structured-expansion-batch-07-candidates.json
          retention-days: 14
