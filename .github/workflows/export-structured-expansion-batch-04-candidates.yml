name: Export Structured Expansion Batch 04 Candidates

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/export-structured-expansion-batch-04-candidates.yml'
      - 'operations/patches/structured-expansion-batch-04-plan.json'
  push:
    branches:
      - data/structured-expansion-batch-04
    paths:
      - '.github/workflows/export-structured-expansion-batch-04-candidates.yml'
      - 'operations/patches/structured-expansion-batch-04-plan.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-04
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Export source-indexed candidates
        run: |
          mkdir -p artifacts
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          if (digest !== manifest.sha256) throw new Error(`bundle digest mismatch: ${digest}`);
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const candidates = data.companies
            .filter(company => company.stage === 'source_indexed')
            .map(company => ({
              code: company.code,
              name: company.name,
              market: company.market,
              industry: company.industry,
              category: company.category,
              sourceUrl: company.sourceUrl,
              document: company.document,
              lastVerifiedDate: company.lastVerifiedDate,
              themes: company.themes,
              summary: company.summary,
              evidenceRefs: company.evidenceRefs,
            }))
            .sort((left, right) => String(left.code).localeCompare(String(right.code), 'ja'));
          if (candidates.length !== 90) throw new Error(`unexpected source-indexed count: ${candidates.length}`);
          const industryCounts = Object.fromEntries([...new Set(candidates.map(row => row.industry))]
            .sort((a, b) => String(a).localeCompare(String(b), 'ja'))
            .map(industry => [industry, candidates.filter(row => row.industry === industry).length]));
          fs.writeFileSync('artifacts/structured-expansion-batch-04-candidates.json', `${JSON.stringify({
            generatedAt: new Date().toISOString(),
            manifest: { sha256: manifest.sha256, companyCount: manifest.companyCount },
            candidateCount: candidates.length,
            industryCounts,
            candidates,
          }, null, 2)}\n`);
          console.log(JSON.stringify({ candidateCount: candidates.length, industryCounts }, null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-04-candidates
          path: artifacts/structured-expansion-batch-04-candidates.json
          retention-days: 14
