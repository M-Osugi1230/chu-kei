name: Research Batch 04 Official Sources

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/research-batch-04-official-sources.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-04
      - name: Fetch official pages and linked assets
        run: |
          mkdir -p artifacts/batch04-sources/pages
          python - <<'PY'
          import html, json, re, urllib.parse, urllib.request

          pages = {
              'meiji': 'https://www.meiji.com/investor/vision/mid-term-plan/',
              'jfront': 'https://www.j-front-retailing.com/ir/policy/management_plan.html',
          }
          headers = {'User-Agent': 'Mozilla/5.0'}
          result = {}

          for key, url in pages.items():
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=40) as response:
                  raw = response.read()
                  charset = response.headers.get_content_charset() or 'utf-8'
              text = raw.decode(charset, errors='replace')
              open(f'artifacts/batch04-sources/pages/{key}.html', 'w', encoding='utf-8').write(text)

              assets = []
              for match in re.finditer(r'(?:href|src)=["\']([^"\']+)["\']', text, re.I):
                  raw_url = html.unescape(match.group(1)).strip()
                  absolute = urllib.parse.urljoin(url, raw_url)
                  assets.append(absolute)
              assets = sorted(set(assets))
              pdfs = [asset for asset in assets if '.pdf' in asset.lower()]
              images = [asset for asset in assets if re.search(r'\.(?:png|jpe?g|webp|svg)(?:\?|$)', asset, re.I)]
              relevant_images = [asset for asset in images if any(token in asset.lower() for token in ('plan', 'vision', 'management', 'mid', '2024', '2026', 'ir_'))]

              metadata = {
                  'title': (re.search(r'<title[^>]*>(.*?)</title>', text, re.I | re.S).group(1).strip()
                            if re.search(r'<title[^>]*>(.*?)</title>', text, re.I | re.S) else None),
                  'publishedTime': (re.search(r'(?:article:published_time|datePublished)[^>]+content=["\']([^"\']+)', text, re.I).group(1)
                                    if re.search(r'(?:article:published_time|datePublished)[^>]+content=["\']([^"\']+)', text, re.I) else None),
                  'modifiedTime': (re.search(r'(?:article:modified_time|dateModified)[^>]+content=["\']([^"\']+)', text, re.I).group(1)
                                   if re.search(r'(?:article:modified_time|dateModified)[^>]+content=["\']([^"\']+)', text, re.I) else None),
              }
              result[key] = {
                  'url': url,
                  'metadata': metadata,
                  'pdfs': pdfs,
                  'relevantImages': relevant_images,
                  'allAssetCount': len(assets),
              }

          open('artifacts/batch04-sources/index.json', 'w', encoding='utf-8').write(json.dumps(result, ensure_ascii=False, indent=2))
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: batch-04-official-source-research
          path: artifacts/batch04-sources/
          retention-days: 14
