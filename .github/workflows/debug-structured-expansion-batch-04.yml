name: Debug Structured Expansion Batch 04

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/debug-structured-expansion-batch-04.yml'
  push:
    branches:
      - data/structured-expansion-batch-04
    paths:
      - '.github/workflows/debug-structured-expansion-batch-04.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-04
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run every stage and capture output
        shell: bash
        run: |
          mkdir -p artifacts/batch04-debug
          set +e
          overall=0
          run_stage() {
            name="$1"
            shift
            echo "===== ${name} =====" | tee "artifacts/batch04-debug/${name}.log"
            "$@" >> "artifacts/batch04-debug/${name}.log" 2>&1
            status=$?
            echo "exit_status=${status}" | tee -a "artifacts/batch04-debug/${name}.log"
            printf '%s\t%s\n' "$name" "$status" >> artifacts/batch04-debug/status.tsv
            if [ "$status" -ne 0 ]; then overall=1; fi
          }

          run_stage 01-governance env GOVERNANCE_LEDGER_BATCH=operations/patches/structured-expansion-batch-04-ledger.json node scripts/apply_governance_ledger_batch_v1.mjs
          run_stage 02-meiji env COMPANY_PATCH=operations/patches/meiji-2026-plan-20260712.json node scripts/apply_company_data_patch_v1.mjs
          run_stage 03-jfront env COMPANY_PATCH=operations/patches/jfront-2024-2026-plan-20260712.json node scripts/apply_company_data_patch_v1.mjs
          run_stage 04-mitsubishielectric env COMPANY_PATCH=operations/patches/mitsubishielectric-strategy-2030-20260712.json node scripts/apply_company_data_patch_v1.mjs
          run_stage 05-secom env COMPANY_PATCH=operations/patches/secom-roadmap-2027-20260712.json node scripts/apply_company_data_patch_v1.mjs
          run_stage 06-olympus env COMPANY_PATCH=operations/patches/olympus-strategy-fy27-fy29-20260712.json node scripts/apply_company_data_patch_v1.mjs
          run_stage 07-quality-rebuild node scripts/rebuild_quality_scores_v2.mjs
          run_stage 08-normalize node scripts/normalize_bundle_contract_v1.mjs
          run_stage 09-v43 node scripts/validate_quality_v43.mjs
          run_stage 10-quality-score node scripts/validate_quality_score_v2.mjs
          run_stage 11-data-contract node scripts/validate_data_contract_v1.mjs
          run_stage 12-dashboard node scripts/validate_quality_dashboard_v1.mjs
          run_stage 13-debt node scripts/validate_quality_debt_budget_v1.mjs
          run_stage 14-governance-check node scripts/validate_review_governance_v1.mjs
          run_stage 15-source-registry node scripts/validate_source_registry_v1.mjs
          run_stage 16-progress node scripts/validate_progress_experience_v1.mjs

          node --input-type=module <<'NODE' > artifacts/batch04-debug/final-counts.json 2>&1
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const counts = data.companies.reduce((result, company) => {
            result[company.stage] = (result[company.stage] ?? 0) + 1;
            return result;
          }, {});
          console.log(JSON.stringify({ digest, manifestSha256: manifest.sha256, companyCount: data.companies.length, progressCount: data.progress.length, counts }, null, 2));
          NODE
          echo "overall=${overall}" >> artifacts/batch04-debug/status.tsv
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: structured-expansion-batch-04-debug
          path: artifacts/batch04-debug/
          retention-days: 7
