name: Discover Structured Expansion Batch 09 Materials

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/discover-structured-expansion-batch-09.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-09
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests beautifulsoup4 pypdf
      - name: Discover official plan materials
        run: |
          python - <<'PY'
          import hashlib, html, json, re, urllib.parse
          from pathlib import Path
          import requests
          from bs4 import BeautifulSoup
          from pypdf import PdfReader

          out=Path('artifacts/structured-expansion-batch-09'); out.mkdir(parents=True,exist_ok=True)
          session=requests.Session(); session.headers.update({'User-Agent':'Mozilla/5.0 (compatible; Chu-kei official evidence audit/1.0)','Accept-Language':'ja,en-US;q=0.8,en;q=0.6'})
          targets={
            '2587':{'name':'サントリービバレッジ&フード','starts':['https://www.suntory.co.jp/softdrink/ir/management/','https://www.suntory.co.jp/softdrink/ir/'],'domains':['suntory.co.jp']},
            '2914':{'name':'日本たばこ産業','starts':['https://www.jti.co.jp/investors/management_plan/','https://www.jti.co.jp/investors/'],'domains':['jti.co.jp']},
            '3092':{'name':'ZOZO','starts':['https://corp.zozo.com/ir/management/','https://corp.zozo.com/ir/'],'domains':['corp.zozo.com']},
            '4324':{'name':'電通グループ','starts':['https://www.group.dentsu.com/jp/ir/strategy/','https://www.group.dentsu.com/jp/ir/'],'domains':['group.dentsu.com']},
            '4443':{'name':'Sansan','starts':['https://ir.corp-sansan.com/ja/management.html','https://ir.corp-sansan.com/ja/'],'domains':['ir.corp-sansan.com']},
            '4478':{'name':'freee','starts':['https://corp.freee.co.jp/ir/','https://corp.freee.co.jp/ir/library/'],'domains':['corp.freee.co.jp']},
            '6723':{'name':'ルネサスエレクトロニクス','starts':['https://www.renesas.com/jp/ja/about/investor-relations','https://www.renesas.com/jp/ja/about/investor-relations/financial-information'],'domains':['renesas.com']},
            '9022':{'name':'東海旅客鉄道','starts':['https://company.jr-central.co.jp/ir/management-plan/','https://company.jr-central.co.jp/ir/'],'domains':['jr-central.co.jp']},
          }
          page_keys=['中期','長期','経営計画','経営戦略','成長戦略','management','strategy','plan','説明会','資本','vision','ir','決算']
          pdf_keys=['中期','長期','経営計画','経営戦略','成長戦略','management','strategy','plan','説明会','資本','vision','決算']
          def allowed(url,domains):
            host=(urllib.parse.urlparse(url).hostname or '').lower()
            return any(host==d or host.endswith('.'+d) for d in domains)
          def get(url,binary=False):
            r=session.get(url,timeout=45,allow_redirects=True); r.raise_for_status()
            return r.content if binary else (r.text,r.url,r.headers.get('content-type',''))
          def score(label,url):
            text=(html.unescape(label+' '+url)).lower().replace(' ','')
            pts=sum(6 for k in pdf_keys if k.lower().replace(' ','') in text)
            pts+=sum(2 for y in ['2040','2035','2030','2029','2028','2027','2026','2025','2024'] if y in text)
            if '統合報告' in text or 'integrated' in text: pts-=2
            return pts
          result={}
          for code,t in targets.items():
            cdir=out/code; cdir.mkdir(exist_ok=True)
            queue=[(u,0) for u in t['starts']]; seen=set(); pages=[]; pdfs={}
            while queue and len(seen)<60:
              url,depth=queue.pop(0)
              if url in seen or not allowed(url,t['domains']): continue
              seen.add(url)
              try: text,final,ctype=get(url)
              except Exception as e: pages.append({'url':url,'error':str(e)}); continue
              if 'pdf' in ctype.lower() or final.lower().split('?')[0].endswith('.pdf'):
                pdfs[final]={'label':'','score':score('',final),'from':url}; continue
              pages.append({'url':final,'contentType':ctype})
              soup=BeautifulSoup(text,'html.parser')
              for node in soup.find_all(['a','iframe','embed','object']):
                raw=node.get('href') or node.get('src') or node.get('data')
                if not raw: continue
                absolute=urllib.parse.urljoin(final,html.unescape(raw)); label=' '.join(node.get_text(' ',strip=True).split()); combined=(label+' '+absolute).lower()
                if '.pdf' in absolute.lower() or 'pdf' in (node.get('type') or '').lower():
                  candidate={'label':label,'score':score(label,absolute),'from':final}; old=pdfs.get(absolute)
                  if old is None or candidate['score']>old['score']: pdfs[absolute]=candidate
                elif depth<3 and allowed(absolute,t['domains']) and any(k.lower() in combined for k in page_keys):
                  queue.append((absolute,depth+1))
              for m in re.findall(r'(?:https?:)?//[^\s"\'<>]+\.pdf(?:\?[^\s"\'<>]*)?|[/A-Za-z0-9_.-]+\.pdf(?:\?[^\s"\'<>]*)?',text,re.I):
                absolute=urllib.parse.urljoin(final,html.unescape(m)); pdfs.setdefault(absolute,{'label':'','score':score('',absolute),'from':final})
            ranked=sorted(({'url':u,**m} for u,m in pdfs.items()),key=lambda x:(-x['score'],x['url']))[:25]
            extracted=[]
            for i,item in enumerate(ranked):
              try:
                data=get(item['url'],True)
                if not data.startswith(b'%PDF') or len(data)>45_000_000: continue
                p=cdir/f'{i:02d}.pdf'; p.write_bytes(data); reader=PdfReader(p); rows=[]; hits=[]
                for n,page in enumerate(reader.pages,1):
                  text=re.sub(r'\s+',' ',(page.extract_text() or '').strip())
                  if text:
                    rows.append({'page':n,'text':text[:15000]})
                    if re.search(r'(ROE|ROIC|ROCE|営業利益|事業利益|売上|収益|キャッシュ|配当|還元|投資|EPS)',text,re.I): hits.append(n)
                pf=cdir/f'{i:02d}.pages.json'; pf.write_text(json.dumps(rows,ensure_ascii=False,indent=2),encoding='utf-8')
                extracted.append({'url':item['url'],'label':item['label'],'from':item['from'],'file':p.name,'pagesFile':pf.name,'pageCount':len(reader.pages),'textPages':len(rows),'metricHitPages':hits[:120],'bytes':len(data),'sha256':hashlib.sha256(data).hexdigest()})
              except Exception as e: item['error']=str(e)
            result[code]={'name':t['name'],'visited':pages,'rankedPdfCandidates':ranked,'extractedPdfs':extracted}
          (out/'report.json').write_text(json.dumps(result,ensure_ascii=False,indent=2),encoding='utf-8')
          summary={c:{'name':v['name'],'visited':len(v['visited']),'candidates':len(v['rankedPdfCandidates']),'extracted':len(v['extractedPdfs']),'best':v['extractedPdfs'][0] if v['extractedPdfs'] else None} for c,v in result.items()}
          (out/'summary.json').write_text(json.dumps(summary,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(summary,ensure_ascii=False,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-09-materials
          path: artifacts/structured-expansion-batch-09/
          retention-days: 14
