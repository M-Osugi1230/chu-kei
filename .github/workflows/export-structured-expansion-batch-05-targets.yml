name: Export Structured Expansion Batch 05 Targets

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/export-structured-expansion-batch-05-targets.yml'
  push:
    branches:
      - data/structured-expansion-batch-05
    paths:
      - '.github/workflows/export-structured-expansion-batch-05-targets.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-05
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Export exact target records
        run: |
          mkdir -p artifacts
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          if (digest !== manifest.sha256) throw new Error('bundle digest mismatch');
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const codes = new Set(['1801', '5711', '6762', '8233', '9005']);
          const companies = data.companies.filter(company => codes.has(String(company.code))).sort((a, b) => String(a.code).localeCompare(String(b.code)));
          if (companies.length !== codes.size) throw new Error(`target count mismatch: ${companies.length}`);
          if (companies.some(company => company.stage !== 'source_indexed')) throw new Error('target is no longer source_indexed');
          const output = { manifest: { sha256: manifest.sha256, companyCount: manifest.companyCount }, codes: [...codes], companies };
          fs.writeFileSync('artifacts/structured-expansion-batch-05-targets.json', `${JSON.stringify(output, null, 2)}\n`);
          console.log(JSON.stringify(companies.map(row => ({ code: row.code, name: row.name, stage: row.stage, sourceUrl: row.sourceUrl })), null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-05-targets
          path: artifacts/structured-expansion-batch-05-targets.json
          retention-days: 14
