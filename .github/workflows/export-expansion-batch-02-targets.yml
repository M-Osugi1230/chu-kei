name: Export Expansion Batch 02 Targets

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/export-expansion-batch-02-targets.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-02
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Export target company records
        run: |
          mkdir -p artifacts/agc-pages artifacts/agc-eir
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          import crypto from 'node:crypto';
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          if (digest !== manifest.sha256) throw new Error('bundle digest mismatch');
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const codes = new Set(['8630', '1925', '5201']);
          const companies = data.companies.filter(company => codes.has(String(company.code)));
          if (companies.length !== codes.size) throw new Error(`target count mismatch: ${companies.length}`);
          fs.writeFileSync('artifacts/structured-expansion-batch-02-targets.json', `${JSON.stringify({ manifest: { sha256: manifest.sha256, companyCount: manifest.companyCount }, companies }, null, 2)}\n`);
          NODE
      - name: Discover AGC official materials
        run: |
          python - <<'PY'
          import html, json, os, re, urllib.parse, urllib.request
          pages = [
              'https://www.agc.com/company/strategy/plan/index.html',
              'https://www.agc.com/ir/library/strategy/index.html',
          ]
          headers = {'User-Agent': 'Mozilla/5.0'}
          candidates = set()
          resources = set()
          fetched = {}
          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  return response.read().decode('utf-8', errors='replace')
          for index, url in enumerate(pages):
              text = fetch(url)
              fetched[url] = text
              open(f'artifacts/agc-pages/page-{index}.html', 'w', encoding='utf-8').write(text)
              for raw in re.findall(r'(?:href|src)=["\']([^"\']+)', text, re.I):
                  absolute = urllib.parse.urljoin(url, html.unescape(raw))
                  if urllib.parse.urlparse(absolute).netloc.endswith('agc.com'):
                      resources.add(absolute)
                  if '.pdf' in absolute.lower(): candidates.add(absolute)
          js_urls = [url for url in sorted(resources) if re.search(r'\.js(?:\?|$)', url, re.I)]
          for index, url in enumerate(js_urls):
              try:
                  text = fetch(url)
              except Exception as error:
                  text = f'ERROR: {error}'
              fetched[url] = text
              open(f'artifacts/agc-eir/script-{index:03d}.txt', 'w', encoding='utf-8').write(f'URL: {url}\n\n{text}')
              for raw in re.findall(r'(?:https?:)?//[^\s"\'<>]+\.pdf(?:\?[^\s"\'<>]*)?|[/A-Za-z0-9_.-]+\.pdf(?:\?[^\s"\'<>]*)?', text, re.I):
                  candidates.add(urllib.parse.urljoin(url, html.unescape(raw)))
          eir_base = 'https://ssl4.eir-parts.net/Custom/public/v5parts/5201/jp/20250804/'
          core_url = eir_base + 'core/eir_common.js'
          core_text = fetch(core_url)
          open('artifacts/agc-eir/eir_common.js', 'w', encoding='utf-8').write(core_text)
          referenced = set()
          for raw in re.findall(r'["\']([^"\']+\.(?:js|json|xml|html)(?:\?[^"\']*)?)["\']', core_text, re.I):
              referenced.add(urllib.parse.urljoin(core_url, html.unescape(raw)))
          for raw in re.findall(r'(?:https?:)?//[^\s"\'<>]+\.pdf(?:\?[^\s"\'<>]*)?|[/A-Za-z0-9_.-]+\.pdf(?:\?[^\s"\'<>]*)?', core_text, re.I):
              candidates.add(urllib.parse.urljoin(core_url, html.unescape(raw)))
          result = {
              'pages': pages,
              'resourcesScanned': len(resources),
              'jsUrls': js_urls,
              'eirBase': eir_base,
              'eirCommonUrl': core_url,
              'eirReferencedResources': sorted(referenced),
              'pdfCandidates': sorted(candidates),
          }
          open('artifacts/agc-official-pdf-links.json', 'w', encoding='utf-8').write(json.dumps(result, ensure_ascii=False, indent=2))
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-02-targets
          path: |
            artifacts/structured-expansion-batch-02-targets.json
            artifacts/agc-official-pdf-links.json
            artifacts/agc-pages/
            artifacts/agc-eir/
          retention-days: 7
