name: Export Structured Expansion Batch 04 Candidates

on:
  push:
    branches:
      - data/structured-expansion-batch-04
    paths:
      - '.github/workflows/export-structured-expansion-batch-04-candidates.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-04
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Export current source-indexed records
        run: |
          mkdir -p artifacts
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import zlib from 'node:zlib';

          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          if (digest !== manifest.sha256) throw new Error(`bundle digest mismatch: ${digest}`);
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const stageCounts = data.companies.reduce((result, company) => {
            result[company.stage] = (result[company.stage] ?? 0) + 1;
            return result;
          }, {});
          const candidates = data.companies
            .filter(company => company.stage === 'source_indexed')
            .map(company => ({
              code: String(company.code),
              name: company.name,
              market: company.market,
              industry: company.industry,
              category: company.category,
              sourceUrl: company.sourceUrl,
              document: company.document,
              lastVerifiedDate: company.lastVerifiedDate,
              expectedBefore: {
                category: company.category,
                stage: company.stage,
                tier: company.tier,
                sourceUrl: company.sourceUrl,
                document: company.document,
                period: company.period,
                planPublishedDate: company.planPublishedDate ?? null,
                lastVerifiedDate: company.lastVerifiedDate,
                themes: company.themes,
                summary: company.summary,
                revenue: company.revenue,
                profit: company.profit,
                margin: company.margin,
                capital: company.capital,
                returnPolicy: company.returnPolicy,
                highlights: company.highlights,
                warnings: company.warnings,
                evidenceRefs: company.evidenceRefs,
                flags: company.flags
              }
            }))
            .sort((left, right) => left.code.localeCompare(right.code, 'ja'));
          if (data.companies.length !== 570) throw new Error(`unexpected company count: ${data.companies.length}`);
          if (stageCounts.core !== 30 || stageCounts.detailed_extracted !== 80 || stageCounts.source_indexed !== 90 || stageCounts.jpx_indexed !== 370) {
            throw new Error(`unexpected stage counts: ${JSON.stringify(stageCounts)}`);
          }
          const output = {
            version: 'structured-expansion-batch-04-candidates-v1',
            bundleSha256: digest,
            companyCount: data.companies.length,
            stageCounts,
            candidateCount: candidates.length,
            candidates
          };
          fs.writeFileSync('artifacts/structured-expansion-batch-04-candidates.json', `${JSON.stringify(output, null, 2)}\n`);
          console.log(JSON.stringify({ bundleSha256: digest, stageCounts, candidateCount: candidates.length }, null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-04-candidates
          path: artifacts/structured-expansion-batch-04-candidates.json
          retention-days: 14
