name: Chu-kei Research Platform v2

on:
  pull_request:
    branches:
      - main
    paths:
      - 'site/history.html'
      - 'site/release.html'
      - 'site/metrics.html'
      - 'site/reports.html'
      - 'site/pricing.html'
      - 'site/privacy.html'
      - 'site/assets/history.js'
      - 'site/assets/release.js'
      - 'site/assets/local-metrics.js'
      - 'site/assets/metrics.js'
      - 'site/data/plan-history.json'
      - 'site/data/progress-events.json'
      - 'site/data/release-status.json'
      - 'schemas/plan-history.schema.json'
      - 'schemas/progress-events.schema.json'
      - 'schemas/site-release-status.schema.json'
      - 'operations/promotion/policy-v1.json'
      - 'operations/site-sync/current.json'
      - 'scripts/validate_research_platform_v2.mjs'
      - '.github/workflows/research-platform-v2.yml'
  push:
    branches:
      - main
    paths:
      - 'site/history.html'
      - 'site/release.html'
      - 'site/metrics.html'
      - 'site/reports.html'
      - 'site/pricing.html'
      - 'site/privacy.html'
      - 'site/assets/history.js'
      - 'site/assets/release.js'
      - 'site/assets/local-metrics.js'
      - 'site/assets/metrics.js'
      - 'site/data/plan-history.json'
      - 'site/data/progress-events.json'
      - 'site/data/release-status.json'
      - 'schemas/plan-history.schema.json'
      - 'schemas/progress-events.schema.json'
      - 'schemas/site-release-status.schema.json'
      - 'operations/promotion/policy-v1.json'
      - 'operations/site-sync/current.json'
      - 'scripts/validate_research_platform_v2.mjs'
      - '.github/workflows/research-platform-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate platform contracts
        run: node scripts/validate_research_platform_v2.mjs
      - name: Validate JavaScript syntax
        run: |
          node --check site/assets/local-metrics.js
          node --check site/assets/metrics.js
          node --check site/assets/release.js
          node --check site/assets/history.js
