name: Apply Structured Expansion Config

on:
  push:
    branches:
      - 'data/**'
    paths:
      - 'operations/patches/structured-expansion-batch-*-config.json'
      - 'scripts/generate_structured_expansion_batch_v2.mjs'
      - '.github/workflows/apply-structured-expansion-config.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'operations/patches/structured-expansion-batch-*-config.json'
      - 'scripts/generate_structured_expansion_batch_v2.mjs'
      - '.github/workflows/apply-structured-expansion-config.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: structured-expansion-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Select next applicable config
        id: select
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import zlib from 'node:zlib';

          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const current = data.companies.filter(row => ['core', 'detailed_extracted'].includes(row.stage)).length;
          const candidates = fs.readdirSync('operations/patches')
            .filter(name => /^structured-expansion-batch-.+-config\.json$/.test(name))
            .map(name => ({ path: path.join('operations/patches', name), config: JSON.parse(fs.readFileSync(path.join('operations/patches', name), 'utf8')) }))
            .filter(({ config }) => config.schemaVersion === 'structured-expansion-batch-config-v2')
            .filter(({ config }) => config.targetStructuredCount === current + config.records.length)
            .filter(({ config }) => config.records.every(record => data.companies.some(row => String(row.code) === String(record.code) && row.stage === 'source_indexed')))
            .sort((a, b) => a.config.targetStructuredCount - b.config.targetStructuredCount || a.path.localeCompare(b.path));

          if (candidates.length > 1) throw new Error(`Multiple applicable configs: ${candidates.map(row => row.path).join(', ')}`);
          const output = process.env.GITHUB_OUTPUT;
          if (candidates.length === 0) {
            fs.appendFileSync(output, `applicable=false\ncurrent=${current}\n`);
            console.log(JSON.stringify({ current, applicable: false }, null, 2));
          } else {
            const selected = candidates[0];
            fs.appendFileSync(output, `applicable=true\nconfig=${selected.path}\nbatch=${selected.config.batchId}\ntarget=${selected.config.targetStructuredCount}\nrecords=${selected.config.records.length}\ncurrent=${current}\n`);
            console.log(JSON.stringify({ current, applicable: true, config: selected.path, batch: selected.config.batchId, target: selected.config.targetStructuredCount }, null, 2));
          }
          NODE
      - name: Generate and apply deterministic batch
        if: steps.select.outputs.applicable == 'true'
        env:
          STRUCTURED_EXPANSION_CONFIG: ${{ steps.select.outputs.config }}
        run: |
          set -euo pipefail
          node scripts/generate_structured_expansion_batch_v2.mjs
          while IFS= read -r patch; do
            [ -n "$patch" ] || continue
            COMPANY_PATCH="$patch" node scripts/apply_company_data_patch_v1.mjs
          done < "operations/patches/${{ steps.select.outputs.batch }}-patch-list.txt"
          GOVERNANCE_LEDGER_BATCH="operations/patches/${{ steps.select.outputs.batch }}-ledger.json" \
            node scripts/apply_governance_ledger_batch_v1.mjs
          node scripts/rebuild_quality_scores_v2.mjs
          node scripts/normalize_bundle_contract_v1.mjs
      - name: Validate counts, evidence debt and bundle budget
        if: steps.select.outputs.applicable == 'true'
        env:
          EXPECTED_TARGET: ${{ steps.select.outputs.target }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import zlib from 'node:zlib';
          const target = Number(process.env.EXPECTED_TARGET);
          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const count = stage => data.companies.filter(row => row.stage === stage).length;
          const pageEvidence = company => (company.evidenceRefs || []).some(ref => /(?:p\.?\s*\d|ページ\s*\d)/i.test(String(ref)));
          const structured = count('core') + count('detailed_extracted');
          const sourceConfirmed = data.companies.filter(row => row.stage !== 'jpx_indexed').length;
          const detailedMissingPageEvidence = data.companies.filter(row => row.stage === 'detailed_extracted' && !pageEvidence(row)).length;
          const dynamicBudget = Math.min(131072, 110304 + Math.max(0, structured - 150) * 800);
          if (data.companies.length !== 570) throw new Error(`company count: ${data.companies.length}`);
          if (structured !== target) throw new Error(`structured count: ${structured}`);
          if (count('core') !== 30) throw new Error(`core count: ${count('core')}`);
          if (count('detailed_extracted') !== target - 30) throw new Error(`detailed count: ${count('detailed_extracted')}`);
          if (count('source_indexed') !== sourceConfirmed - target) throw new Error(`source indexed count: ${count('source_indexed')}`);
          if (sourceConfirmed !== 200) throw new Error(`source confirmed count: ${sourceConfirmed}`);
          if (detailedMissingPageEvidence > 48) throw new Error(`detailed missing page evidence: ${detailedMissingPageEvidence}`);
          if (manifest.compressedBytes > dynamicBudget) throw new Error(`bundle budget: ${manifest.compressedBytes} > ${dynamicBudget}`);
          console.log(JSON.stringify({ structured, detailed: count('detailed_extracted'), sourceIndexed: count('source_indexed'), sourceConfirmed, detailedMissingPageEvidence, compressedBytes: manifest.compressedBytes, dynamicBudget }, null, 2));
          NODE
      - name: Validate quality contracts
        if: steps.select.outputs.applicable == 'true'
        run: |
          npm run quality:v43
          npm run quality:local
      - name: Commit generated source of truth
        if: steps.select.outputs.applicable == 'true'
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          rm -rf artifacts node_modules
          rm -f package-lock.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: apply ${{ steps.select.outputs.batch }}"
          git push origin "HEAD:${TARGET_BRANCH}"
      - name: No applicable config
        if: steps.select.outputs.applicable != 'true'
        run: echo "No unapplied structured expansion config matches the current source of truth."
