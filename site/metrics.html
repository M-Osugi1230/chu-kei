<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Chu-keiのこの端末内だけに保存される利用状況を確認します。"><title>端末内の利用状況｜Chu-kei</title><link rel="stylesheet" href="./assets/styles.css"><link rel="stylesheet" href="./assets/platform-pages.css"></head><body><a class="skip-link" href="#main">本文へ移動</a><header class="site-header"><div class="header-inner"><a class="brand" href="./">Chu-kei</a><span class="subtitle">端末内の利用状況</span><nav class="header-nav" aria-label="主要ナビゲーション"><a class="text-link" href="./">企業を探す</a><a class="text-link" href="./quality.html">品質</a><a class="text-link" href="./release.html">公開同期</a></nav></div></header><main id="main"><section class="page-hero"><p class="eyebrow">Local-only Measurement</p><h1>利用状況は、<br>この端末の中だけ。</h1><p>検索・保存・比較へ到達できているかを改善に役立てるため、操作回数をブラウザ内に保存します。外部送信、個人識別、広告利用は行いません。</p></section><div class="content-shell"><p id="metric-period" class="form-note"></p><section id="metric-summary" class="platform-grid" aria-live="polite"></section><section class="section"><div class="platform-grid"><article class="platform-card"><h2>操作別</h2><table class="data-table"><thead><tr><th>操作</th><th>回数</th></tr></thead><tbody id="event-body"></tbody></table></article><article class="platform-card"><h2>ページ別</h2><table class="data-table"><thead><tr><th>ページ</th><th>表示</th></tr></thead><tbody id="page-body"></tbody></table></article></div></section><section class="section platform-card"><h2>管理</h2><p>データはこのブラウザのlocalStorageだけに保存されます。JSONとして持ち出すか、いつでも削除できます。</p><div class="actions"><button id="export-metrics" class="primary-button" type="button">JSONを書き出す</button><button id="reset-metrics" class="secondary-button" type="button">端末内データを削除</button></div></section></div></main><footer><p>外部解析SDKは使用していません。</p></footer><script src="./assets/local-metrics.js"></script><script src="./assets/metrics.js"></script></body></html>
