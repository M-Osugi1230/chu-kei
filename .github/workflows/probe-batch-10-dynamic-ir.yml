name: Probe Batch 10 Dynamic IR

on:
  push:
    branches:
      - data/structured-expansion-batch-10
    paths:
      - '.github/workflows/probe-batch-10-dynamic-ir.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Render dynamic IR pages and collect links
        run: |
          mkdir -p artifacts/batch-10-dynamic
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { chromium } from 'playwright';

          const targets = {
            '7685': [
              'https://buysell-technologies.com/ir/settlement/',
              'https://buysell-technologies.com/ir/plan/'
            ],
            '6963': [
              'https://www.rohm.co.jp/company/about/philosophy/mediumterm-management-plan',
              'https://www.rohm.co.jp/ir/library/materials-for-financial-results-briefing'
            ]
          };
          const browser = await chromium.launch({ headless: true });
          const result = {};
          for (const [code, urls] of Object.entries(targets)) {
            result[code] = [];
            for (const url of urls) {
              const page = await browser.newPage();
              const responses = [];
              page.on('response', response => {
                const value = response.url();
                const type = response.headers()['content-type'] || '';
                if (/pdf|json|api|ir|settlement|plan/i.test(`${value} ${type}`)) responses.push({ url: value, status: response.status(), contentType: type });
              });
              try {
                await page.goto(url, { waitUntil: 'networkidle', timeout: 90000 });
                await page.waitForTimeout(3000);
                const links = await page.locator('a').evaluateAll(nodes => nodes.map(node => ({
                  text: (node.textContent || '').replace(/\s+/g, ' ').trim(),
                  href: node.href || ''
                })).filter(row => row.href));
                const bodyText = await page.locator('body').innerText();
                const html = await page.content();
                const name = `${code}-${Buffer.from(url).toString('hex').slice(0, 16)}`;
                fs.writeFileSync(`artifacts/batch-10-dynamic/${name}.html`, html);
                fs.writeFileSync(`artifacts/batch-10-dynamic/${name}.txt`, bodyText);
                await page.screenshot({ path: `artifacts/batch-10-dynamic/${name}.png`, fullPage: true });
                result[code].push({ url, finalUrl: page.url(), title: await page.title(), links, responses });
              } catch (error) {
                result[code].push({ url, error: String(error), responses });
              }
              await page.close();
            }
          }
          await browser.close();
          fs.writeFileSync('artifacts/batch-10-dynamic/report.json', JSON.stringify(result, null, 2));
          console.log(JSON.stringify(Object.fromEntries(Object.entries(result).map(([code, pages]) => [code, pages.map(row => ({ url: row.url, title: row.title, links: row.links?.filter(link => /pdf|決算|中期|計画/i.test(`${link.text} ${link.href}`)).slice(0, 30), responses: row.responses?.slice(0, 30), error: row.error }))])), null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: batch-10-dynamic-ir
          path: artifacts/batch-10-dynamic/
          retention-days: 14
