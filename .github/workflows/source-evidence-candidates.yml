name: Chu-kei Source Evidence Candidates

on:
  pull_request:
    paths:
      - 'site/data/**'
      - 'scripts/collect_source_evidence_candidates_v1.py'
      - 'scripts/validate_source_evidence_candidates_v1.py'
      - 'schemas/source-evidence-candidates-v1.schema.json'
      - 'docs/SOURCE_EVIDENCE_CANDIDATES_V1.md'
      - '.github/workflows/source-evidence-candidates.yml'
  push:
    branches:
      - main
    paths:
      - 'site/data/**'
      - 'scripts/collect_source_evidence_candidates_v1.py'
      - 'scripts/validate_source_evidence_candidates_v1.py'
      - 'schemas/source-evidence-candidates-v1.schema.json'
      - 'docs/SOURCE_EVIDENCE_CANDIDATES_V1.md'
      - '.github/workflows/source-evidence-candidates.yml'
  schedule:
    - cron: '15 23 * * 0'
  workflow_dispatch:
    inputs:
      limit:
        description: '0 collects all current production repair targets'
        required: false
        default: '0'

permissions:
  contents: read

jobs:
  policy-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile scripts
        run: |
          python -m py_compile scripts/collect_source_evidence_candidates_v1.py
          python -m py_compile scripts/validate_source_evidence_candidates_v1.py
      - name: Generate dry-run candidate report
        run: python scripts/collect_source_evidence_candidates_v1.py --dry-run
      - name: Validate candidate policy
        run: python scripts/validate_source_evidence_candidates_v1.py artifacts/source-evidence-candidates-v1.json
      - name: Upload dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chu-kei-source-evidence-dry-run
          path: |
            artifacts/source-evidence-candidates-v1.json
            artifacts/source-evidence-candidates-validation-v1.json
          if-no-files-found: error
          retention-days: 30

  collect-live:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PDF metadata and text tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      - name: Collect official-source candidates
        run: python scripts/collect_source_evidence_candidates_v1.py --limit "${{ inputs.limit || '0' }}"
      - name: Validate live candidate policy
        run: python scripts/validate_source_evidence_candidates_v1.py artifacts/source-evidence-candidates-v1.json
      - name: Upload candidate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chu-kei-source-evidence-candidates
          path: |
            artifacts/source-evidence-candidates-v1.json
            artifacts/source-evidence-candidates-validation-v1.json
          if-no-files-found: error
          retention-days: 90
