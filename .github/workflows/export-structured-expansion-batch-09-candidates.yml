name: Export Structured Expansion Batch 09 Candidates

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/export-structured-expansion-batch-09-candidates.yml'
  push:
    branches:
      - data/structured-expansion-batch-09
    paths:
      - '.github/workflows/export-structured-expansion-batch-09-candidates.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-09
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Export source-indexed companies
        run: |
          mkdir -p artifacts
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import zlib from 'node:zlib';

          const manifest = JSON.parse(fs.readFileSync('site/data/bundle.manifest.json', 'utf8'));
          const compressed = Buffer.concat(manifest.parts.map(part => fs.readFileSync(`site/data/${part.file}`)));
          const digest = crypto.createHash('sha256').update(compressed).digest('hex');
          if (digest !== manifest.sha256) throw new Error(`bundle digest mismatch: ${digest}`);
          const data = JSON.parse(zlib.gunzipSync(compressed));
          const sourceIndexed = data.companies
            .filter(company => company.stage === 'source_indexed')
            .sort((left, right) => String(left.code).localeCompare(String(right.code), 'ja'));
          if (sourceIndexed.length !== 65) throw new Error(`unexpected source-indexed count: ${sourceIndexed.length}`);
          const structuredCount = data.companies.filter(row => ['core', 'detailed_extracted'].includes(row.stage)).length;
          const sourceConfirmedCount = data.companies.filter(row => row.stage !== 'jpx_indexed').length;
          if (structuredCount !== 135) throw new Error(`unexpected structured count: ${structuredCount}`);
          if (sourceConfirmedCount !== 200) throw new Error(`unexpected source-confirmed count: ${sourceConfirmedCount}`);
          const byIndustry = Object.fromEntries(
            [...new Set(sourceIndexed.map(row => row.industry))]
              .sort((left, right) => String(left).localeCompare(String(right), 'ja'))
              .map(industry => [industry, sourceIndexed.filter(row => row.industry === industry).length])
          );
          fs.writeFileSync('artifacts/structured-expansion-batch-09-candidates.json', `${JSON.stringify({
            generatedAt: new Date().toISOString(),
            manifest: { sha256: manifest.sha256, companyCount: manifest.companyCount, progressCount: manifest.progressCount, structuredCount, sourceConfirmedCount },
            sourceIndexedCount: sourceIndexed.length,
            byIndustry,
            companies: sourceIndexed,
          }, null, 2)}\n`);
          console.log(JSON.stringify({ structuredCount, sourceConfirmedCount, sourceIndexedCount: sourceIndexed.length, industryCount: Object.keys(byIndustry).length, sha256: digest }, null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-09-candidates
          path: artifacts/structured-expansion-batch-09-candidates.json
          retention-days: 14
