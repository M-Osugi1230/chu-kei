name: Probe Structured Expansion Batch 11 Finalists

on:
  push:
    branches:
      - data/structured-expansion-batch-11
    paths:
      - '.github/workflows/probe-structured-expansion-batch-11-finalists.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/probe-structured-expansion-batch-11-finalists.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/structured-expansion-batch-11
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests beautifulsoup4 pypdf
      - name: Probe finalist plan PDFs
        run: |
          python - <<'PY'
          import hashlib, html, json, re, urllib.parse
          from pathlib import Path
          import requests
          from bs4 import BeautifulSoup
          from pypdf import PdfReader

          out=Path('artifacts/batch-11-finalists'); out.mkdir(parents=True,exist_ok=True)
          s=requests.Session(); s.headers.update({'User-Agent':'Mozilla/5.0 (compatible; Chu-kei evidence audit/1.0)','Accept-Language':'ja,en;q=0.7'})
          targets={
            '3491': {'name':'GA technologies','urls':['https://www.ga-tech.co.jp/ir/','https://www.ga-tech.co.jp/ir/library/'], 'domains':['ga-tech.co.jp']},
            '4443': {'name':'Sansan','urls':['https://ir.corp-sansan.com/ja/','https://ir.corp-sansan.com/ja/library.html'], 'domains':['ir.corp-sansan.com']},
            '4475': {'name':'HENNGE','urls':['https://hennge.com/jp/ir/','https://hennge.com/jp/ir/library/'], 'domains':['hennge.com']},
            '5253': {'name':'カバー','urls':['https://cover-corp.com/ir','https://cover-corp.com/ir/news'], 'domains':['cover-corp.com']},
            '6777': {'name':'santec Holdings','urls':['https://www.santec.com/jp/ir/index.html','https://www.santec.com/jp/ir/library.html'], 'domains':['santec.com']},
            '7826': {'name':'フルヤ金属','urls':['https://www.furuyametals.co.jp/ir/','https://www.furuyametals.co.jp/ir/library/'], 'domains':['furuyametals.co.jp']},
          }
          keys=['中期','長期','経営計画','経営戦略','成長戦略','事業計画','management','strategy','plan','説明会','決算','資本','vision','2030','2029','2028','2027','2026']
          metric=re.compile(r'(中期経営計画|中期財務方針|長期経営計画|売上高|売上収益|ARR|営業利益|EBITDA|EBITA|ROE|ROIC|成長投資|設備投資|M&A|配当性向|株主還元|自己株式取得|202[6-9]|2030)',re.I)
          def allowed(u,domains):
            h=(urllib.parse.urlparse(u).hostname or '').lower(); return any(h==d or h.endswith('.'+d) for d in domains)
          def get(u,b=False):
            r=s.get(u,timeout=30,allow_redirects=True); r.raise_for_status(); return r.content if b else (r.text,r.url,r.headers.get('content-type',''))
          result={}
          for code,t in targets.items():
            cdir=out/code; cdir.mkdir(exist_ok=True); queue=[(u,0) for u in t['urls']]; seen=set(); pdfs={}; visited=[]
            while queue and len(seen)<20:
              u,depth=queue.pop(0)
              if u in seen or not allowed(u,t['domains']): continue
              seen.add(u)
              try: text,final,ctype=get(u)
              except Exception as error: visited.append({'url':u,'error':str(error)}); continue
              if 'pdf' in ctype.lower() or final.lower().split('?')[0].endswith('.pdf'):
                pdfs.setdefault(final,{'label':'','from':u,'linkScore':0}); continue
              visited.append({'url':final})
              soup=BeautifulSoup(text,'html.parser')
              for node in soup.find_all(['a','iframe','embed','object']):
                raw=node.get('href') or node.get('src') or node.get('data')
                if not raw: continue
                x=urllib.parse.urljoin(final,html.unescape(raw)); label=' '.join(node.get_text(' ',strip=True).split()); combined=(label+' '+x).lower()
                score=sum(4 for k in keys if k.lower() in combined)
                if '.pdf' in x.lower() or 'pdf' in (node.get('type') or '').lower():
                  previous=pdfs.get(x); candidate={'label':label,'from':final,'linkScore':score}
                  if previous is None or score>previous['linkScore']: pdfs[x]=candidate
                elif depth<2 and allowed(x,t['domains']) and any(k.lower() in combined for k in keys): queue.append((x,depth+1))
              for match in re.findall(r'(?:https?:)?//[^\s"\'<>]+\.pdf(?:\?[^\s"\'<>]*)?|[/A-Za-z0-9_.-]+\.pdf(?:\?[^\s"\'<>]*)?',text,re.I):
                x=urllib.parse.urljoin(final,html.unescape(match)); pdfs.setdefault(x,{'label':'','from':final,'linkScore':0})
            candidates=sorted(({'url':u,**meta} for u,meta in pdfs.items()),key=lambda row:(-row['linkScore'],row['url']))[:12]; extracted=[]
            for index,item in enumerate(candidates):
              try:
                data=get(item['url'],True)
                if not data.startswith(b'%PDF') or len(data)>35_000_000: continue
                path=cdir/f'{index:02d}.pdf'; path.write_bytes(data); reader=PdfReader(path); rows=[]; score=0; hit_pages=[]
                for page_no,page in enumerate(reader.pages,1):
                  text=re.sub(r'\s+',' ',(page.extract_text() or '').strip())
                  if text:
                    rows.append({'page':page_no,'text':text[:18000]}); hits=metric.findall(text); score+=len(hits)
                    if hits: hit_pages.append(page_no)
                pages_file=cdir/f'{index:02d}.pages.json'; pages_file.write_text(json.dumps(rows,ensure_ascii=False,indent=2),encoding='utf-8')
                extracted.append({**item,'file':path.name,'pagesFile':pages_file.name,'pageCount':len(reader.pages),'textPages':len(rows),'score':score,'hitPages':hit_pages[:120],'metadata':{str(k):str(v) for k,v in (reader.metadata or {}).items()},'bytes':len(data),'sha256':hashlib.sha256(data).hexdigest()})
              except Exception as error: item['error']=str(error)
            extracted.sort(key=lambda row:(-row['score'],-row['linkScore'],row['url']))
            result[code]={'name':t['name'],'visited':visited,'candidates':candidates,'extracted':extracted}
          (out/'report.json').write_text(json.dumps(result,ensure_ascii=False,indent=2),encoding='utf-8')
          summary={code:{'name':value['name'],'visited':len(value['visited']),'candidates':len(value['candidates']),'extracted':len(value['extracted']),'best':value['extracted'][0] if value['extracted'] else None} for code,value in result.items()}
          (out/'summary.json').write_text(json.dumps(summary,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(summary,ensure_ascii=False,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: structured-expansion-batch-11-finalists
          path: artifacts/batch-11-finalists/
          retention-days: 14
